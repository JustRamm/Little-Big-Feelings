<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Big Feelings</title>
    <meta name="description"
        content="A fun educational memory card game helping children understand emotions, triggers, and healthy coping actions.">

    <!-- Social Preview (Open Graph) -->
    <meta property="og:title" content="Little Big Feelings">
    <meta property="og:description" content="A fun educational memory card game helping children understand emotions, triggers, and healthy coping actions.">
    <meta property="og:image" content="https://little-big-feelings.vercel.app/assets/brand/nextlogo.svg">
    <meta property="og:type" content="website">

    <!-- Twitter Preview -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Little Big Feelings">
    <meta name="twitter:description" content="Explore and understand your wonderful emotions!">
    <meta name="twitter:image" content="https://little-big-feelings.vercel.app/assets/brand/nextlogo.svg">


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Global styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg">
    <!-- Lucide Icons (Local copy to avoid tracking prevention issues) -->
    <script src="vendor/lucide.min.js"></script>
</head>

<body>
    <!--
        #app is the ONLY mount point.
        All screen HTML is injected at runtime by main.js
        using each screen module's template() function.

        Screen modules loaded:
          screens/Splash.js       → #screen-splash
          screens/LevelSelect.js  → #screen-level
          screens/Tutorial.js     → #screen-tutorial
          screens/Game.js         → #screen-game
          screens/OverlayMatch.js → #overlay-match
          screens/OverlayWrong.js → #overlay-wrong
          screens/Victory.js      → #screen-victory
    -->
    <div id="app"></div>

    <!-- Entry point — type="module" enables ES imports -->
    <script type="module" src="main.js"></script>
</body>

</html>
