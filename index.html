<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emo Charge! | Emotional Intelligence Game</title>
    <meta name="description"
        content="A fun educational memory card game helping children understand emotions, triggers, and healthy coping actions.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Global styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>
    <!--
        #app is the ONLY mount point.
        All screen HTML is injected at runtime by main.js
        using each screen module's template() function.

        Screen modules loaded:
          screens/Splash.js       → #screen-splash
          screens/LevelSelect.js  → #screen-level
          screens/Tutorial.js     → #screen-tutorial
          screens/Game.js         → #screen-game
          screens/OverlayMatch.js → #overlay-match
          screens/OverlayWrong.js → #overlay-wrong
          screens/Victory.js      → #screen-victory
    -->
    <div id="app"></div>

    <!-- Entry point — type="module" enables ES imports -->
    <script type="module" src="main.js"></script>
</body>

</html>
