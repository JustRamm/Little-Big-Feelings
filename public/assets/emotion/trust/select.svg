<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Base -->
  <rect x="10" y="10" width="180" height="180" rx="30" fill="white" stroke="#66BB6A" stroke-width="4" />
  <!-- Trust Face -->
