<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Lion 🦁 - Fixed for better recognizability -->
  <!-- Mane: Large fluffy orange circle -->
  <circle cx="50" cy="50" r="48" fill="#F57C00" />
  <!-- Mane details (tufts) -->
  <circle cx="50" cy="8" r="10" fill="#F57C00" />
  <circle cx="20" cy="18" r="10" fill="#F57C00" />
  <circle cx="80" cy="18" r="10" fill="#F57C00" />
  <circle cx="8" cy="50" r="10" fill="#F57C00" />
  <circle cx="92" cy="50" r="10" fill="#F57C00" />
  <circle cx="20" cy="82" r="10" fill="#F57C00" />
  <circle cx="80" cy="82" r="10" fill="#F57C00" />
  <circle cx="50" cy="92" r="10" fill="#F57C00" />
  
  <!-- Head -->
  <circle cx="50" cy="50" r="35" fill="#FFD54F" />
  
  <!-- Ears -->
  <circle cx="25" cy="30" r="10" fill="#FFD54F" />
  <circle cx="75" cy="30" r="10" fill="#FFD54F" />
  <circle cx="25" cy="30" r="5" fill="#F57C00" />
  <circle cx="75" cy="30" r="5" fill="#F57C00" />

  <!-- Eyes: Large and friendly -->
  <circle cx="38" cy="45" r="5" fill="#3E2723" />
  <circle cx="62" cy="45" r="5" fill="#3E2723" />
  <!-- Eye highlights -->
  <circle cx="40" cy="43" r="2" fill="white" />
  <circle cx="64" cy="43" r="2" fill="white" />

  <!-- Nose/Muzzle area -->
  <ellipse cx="50" cy="62" rx="12" ry="8" fill="#FFF9C4" />
  <path d="M46 58 L54 58 L50 63 Z" fill="#D81B60" /> <!-- Nose -->

  <!-- Mouth -->
  <path d="M42 66 Q50 72 58 66" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round" fill="none" />
</svg>
