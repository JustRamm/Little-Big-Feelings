<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
    <style>
        @keyframes revolve {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .revolve-container {
            animation: revolve 15s linear infinite;
            transform-origin: 148px 105px;
        }
    </style>
    <defs>
        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF" />
            <stop offset="100%" style="stop-color:#F0F4F8" />
        </linearGradient>
        <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF80AB" />
            <stop offset="100%" style="stop-color:#D81B60" />
        </linearGradient>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Large Friendly Cloud (The "Big") -->
    <g transform="translate(28, 60)" filter="url(#softGlow)">
        <path d="M40,60 Q40,20 80,20 Q100,-10 130,10 Q160,-10 180,20 Q220,20 220,60 Q220,100 180,100 L60,100 Q20,100 20,60 Z" fill="url(#cloudGrad)" />
        
        <!-- Friendly Face -->
        <g transform="translate(100, 45)">
            <circle cx="-25" cy="0" r="5" fill="#5D4037" />
            <circle cx="25" cy="0" r="5" fill="#5D4037" />
            <path d="M-15,15 Q0,30 15,15" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round" />
            <!-- Rosy Cheeks -->
            <circle cx="-35" cy="15" r="8" fill="#FF80AB" opacity="0.3" />
            <circle cx="35" cy="15" r="8" fill="#FF80AB" opacity="0.3" />
        </g>
    </g>

    <!-- Revolving Wrapper for Heart and Sparkles -->
    <g class="revolve-container">
        <!-- Small Vibrant Heart (The "Little") -->
        <g transform="translate(180, 140) rotate(-10)" filter="url(#softGlow)">
            <path d="M25,45 C15,35 5,25 5,15 C5,8 10,2 18,2 C22,2 25,5 28,10 C31,5 34,2 38,2 C46,2 51,8 51,15 C51,25 41,35 31,45 Z" fill="url(#heartGrad)" />
        </g>

        <!-- Playful Sparkles -->
        <g fill="#FFD54F">
            <path d="M50,40 L54,48 L62,48 L56,54 L59,62 L50,57 L41,62 L44,54 L38,48 L46,48 Z" />
            <path d="M210,50 L213,56 L220,56 L215,60 L217,66 L210,63 L203,66 L205,60 L200,56 L207,56 Z" transform="scale(0.7)" />
        </g>
    </g>
</svg>
