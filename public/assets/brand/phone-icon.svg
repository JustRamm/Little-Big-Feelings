<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients and Filters -->
        <linearGradient id="iconBg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FF80AB" />
            <stop offset="100%" style="stop-color:#FF4081" />
        </linearGradient>
        <linearGradient id="cloudBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF" />
            <stop offset="100%" style="stop-color:#F5F9FF" />
        </linearGradient>
        <filter id="ultraShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feOffset dx="0" dy="12" result="offset" />
            <feComponentTransfer in="offset" result="opacity">
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feComposite in="SourceGraphic" in2="opacity" operator="over" />
        </filter>
    </defs>

    <!-- Base Icon Container (Rounded Square) -->
    <rect width="512" height="512" rx="120" fill="url(#iconBg)" />
    
    <!-- Big Cloud Group (Perfectly Centralized) -->
    <!-- Original center of path (-130..190, -70..110) was (30, 20). 
         With scale 1.48: New translate is (256 - 30*1.48, 256 - 20*1.48) = (211.6, 226.4) -->
    <g transform="translate(212, 226) scale(1.48)" filter="url(#ultraShadow)">
        <!-- The Main Big Cloud Path -->
        <path d="M-130,40 Q-130,-30 -70,-30 Q-40,-70 40,-30 Q90,-70 140,-30 Q190,-30 190,40 Q190,110 120,110 L-70,110 Q-130,110 -130,40 Z" fill="url(#cloudBody)" />
        
        <!-- Expressive Cute Face -->
        <g transform="translate(10, 20)">
            <!-- Shiny Eyes -->
            <circle cx="-50" cy="0" r="14" fill="#3D2B1F" />
            <circle cx="50" cy="0" r="14" fill="#3D2B1F" />
            <circle cx="-55" cy="-5" r="5" fill="white" />
            <circle cx="45" cy="-5" r="5" fill="white" />
            
            <!-- Happy Mouth -->
            <path d="M-10,25 Q0,40 10,25" stroke="#3D2B1F" stroke-width="6" fill="none" stroke-linecap="round" />
            
            <!-- Blushing Cheeks -->
            <circle cx="-80" cy="20" r="22" fill="#FF80AB" opacity="0.4" />
            <circle cx="80" cy="20" r="22" fill="#FF80AB" opacity="0.4" />
        </g>

        <!-- The "Little Big" Side Heart -->
        <g transform="translate(140, 95) rotate(15)">
            <path d="M15,35 C5,25 -5,15 -5,5 C-5,-1 0,-7 8,-7 C13,-7 15,-3 18,1 C21,-3 23,-7 28,-7 C36,-7 41,-1 41,5 C41,15 31,25 21,35 Z" fill="#FF4081" stroke="white" stroke-width="3" />
        </g>
    </g>

    <!-- Subtle Depth Overlays -->
    <rect width="512" height="250" rx="120" fill="white" opacity="0.08" />
</svg>
