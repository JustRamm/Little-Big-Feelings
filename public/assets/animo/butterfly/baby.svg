<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Caterpillar (Butterfly larva) -->
    
    <!-- Segmented Body -->
    <circle cx="20" cy="95" r="10" fill="#4B0082" />
    <circle cx="35" cy="95" r="12" fill="#4A148C" />
    <circle cx="50" cy="95" r="14" fill="#4B0082" />
    <circle cx="65" cy="95" r="16" fill="#4A148C" />
    
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 80px 80px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
    </style>

    <!-- Head -->
    <circle cx="80" cy="85" r="20" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="72" cy="80" r="4" fill="#4A148C" />
        <circle cx="88" cy="80" r="4" fill="#4A148C" />
        <circle cx="74" cy="78" r="2" fill="white" />
        <circle cx="90" cy="78" r="2" fill="white" />
    </g>
    
    <!-- Little Mouth -->
    <path d="M76 90 Q80 95 84 90" fill="none" stroke="#9C27B0" stroke-width="1.5" stroke-linecap="round" />
    
    <!-- Antennae -->
    <path d="M75 68 Q72 60 68 62 M85 68 Q88 60 92 62" stroke="#4A148C" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
