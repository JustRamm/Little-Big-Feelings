<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Butterfly (Avatar 12 style with body) -->
    <!-- Large Body (Based on Avatar 12) -->
    <rect x="47" y="60" width="6" height="65" rx="3" fill="#4A148C" stroke="#9C27B0" stroke-width="2" />
    
    <style>
        .wing-left { animation: flap-left 0.5s ease-in-out infinite; transform-origin: 50px 75px; }
        .wing-right { animation: flap-right 0.5s ease-in-out infinite; transform-origin: 50px 75px; }
        @keyframes flap-left {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(40deg); }
        }
        @keyframes flap-right {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-40deg); }
        }
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 45px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
    </style>

    <!-- Majestic Adult Butterfly Wings (4-part) -->
    <g class="wing-left">
        <!-- Lower Wing L -->
        <path d="M47 80 Q25 125 35 140 Q50 130 47 80" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2.5" />
        <!-- Upper Wing L -->
        <path d="M47 70 Q10 20 8 45 Q15 90 47 70" fill="#E1BEE7" stroke="#9C27B0" stroke-width="3" />
        <circle cx="25" cy="45" r="5" fill="white" opacity="0.6" />
        <circle cx="35" cy="115" r="4" fill="white" opacity="0.4" />
    </g>
    <g class="wing-right">
        <!-- Lower Wing R -->
        <path d="M53 80 Q75 125 65 140 Q50 130 53 80" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2.5" />
        <!-- Upper Wing R -->
        <path d="M53 70 Q90 20 92 45 Q85 90 53 70" fill="#E1BEE7" stroke="#9C27B0" stroke-width="3" />
        <circle cx="75" cy="45" r="5" fill="white" opacity="0.6" />
        <circle cx="65" cy="115" r="4" fill="white" opacity="0.4" />
    </g>
    
    <!-- Head (Based on Avatar 12 style) -->
    <circle cx="50" cy="50" r="35" fill="white" stroke="#9C27B0" stroke-width="2" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="42" cy="45" r="4" fill="#4A148C" />
        <circle cx="58" cy="45" r="4" fill="#4A148C" />
    </g>
    <path d="M44 60 Q50 68 56 60" fill="none" stroke="#9C27B0" stroke-width="2" stroke-linecap="round" />
    <!-- Antennae (Based on Avatar 12) -->
    <path d="M48 30 Q40 10 35 15 M52 30 Q60 10 65 15" stroke="#4A148C" stroke-width="3" fill="none" stroke-linecap="round" />
    
    <!-- Butterfly Legs -->
    <path d="M47 85 L40 90 M47 95 L40 100 M47 105 L40 110" stroke="#4A148C" stroke-width="1" stroke-linecap="round" fill="none" />
    <path d="M53 85 L60 90 M53 95 L60 100 M53 105 L60 110" stroke="#4A148C" stroke-width="1" stroke-linecap="round" fill="none" />
</svg>
