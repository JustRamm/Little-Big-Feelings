<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="sunset-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1A237E" />
            <stop offset="40%" stop-color="#4A148C" />
            <stop offset="70%" stop-color="#AD1457" />
            <stop offset="90%" stop-color="#F57F17" />
            <stop offset="100%" stop-color="#FFD600" />
        </linearGradient>
        <radialGradient id="firefly" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#EEFF41" stop-opacity="1" />
            <stop offset="100%" stop-color="#EEFF41" stop-opacity="0" />
        </radialGradient>
        <radialGradient id="flower-glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFEE58" />
            <stop offset="100%" stop-color="#FBC02D" />
        </radialGradient>
    </defs>

    <style>
        .flower-sway { animation: sway 7s infinite ease-in-out; transform-origin: center bottom; }
        @keyframes sway {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }
        .cloud-float { animation: float 15s infinite linear; }
        @keyframes float {
            from { transform: translateX(-50px); }
            to { transform: translateX(50px); }
        }
        .firefly-glow { animation: glow 4s infinite alternate ease-in-out; }
        @keyframes glow {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .star-twinkle { animation: twinkle 3s infinite alternate; }
        @keyframes twinkle {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>

    <!-- Evening Sky -->
    <rect width="1000" height="1000" fill="url(#sunset-sky)" />
    
    <!-- Distant Night Clouds -->
    <g class="cloud-float" opacity="0.2">
        <circle cx="200" cy="150" r="50" fill="white" />
        <circle cx="800" cy="180" r="60" fill="white" />
        <circle cx="450" cy="120" r="40" fill="white" />
    </g>

    <!-- Subtle Evening Stars -->
    <circle class="star-twinkle" cx="100" cy="80" r="1.5" fill="white" />
    <circle class="star-twinkle" cx="900" cy="150" r="1.2" fill="white" opacity="0.6" />
    
    <!-- Garden Flowers (Colorful Variety) -->
    <!-- Pink Flowers (Left) -->
    <g class="flower-sway" transform="translate(150, 800)">
        <path d="M0 0 L0 -50" stroke="#2E7D32" stroke-width="4" fill="none" />
        <circle cx="0" cy="-60" r="15" fill="#F06292" />
        <circle cx="-15" cy="-60" r="15" fill="#F06292" />
        <circle cx="15" cy="-60" r="15" fill="#F06292" />
        <circle cx="0" cy="-75" r="15" fill="#F06292" />
        <circle cx="0" cy="-60" r="5" fill="#FFEE58" />
    </g>

    <!-- Yellow Sun-like Flowers (Right) -->
    <g class="flower-sway" transform="translate(800, 850) scale(1.2)">
        <path d="M0 0 L0 -80" stroke="#388E3C" stroke-width="6" fill="none" />
        <circle cx="0" cy="-80" r="40" fill="#FBC02D" />
        <circle cx="0" cy="-80" r="15" fill="#5D4037" />
    </g>

    <!-- Blue Tulips (Center-ish) -->
    <g class="flower-sway" transform="translate(350, 880) scale(0.9)">
        <path d="M0 0 L0 -100" stroke="#1B5E20" stroke-width="4" fill="none" />
        <path d="M-20 -100 Q0 -140 20 -100 T0 -120 T-20 -100" fill="#42A5F5" />
    </g>
    <g class="flower-sway" transform="translate(450, 920) scale(0.8)">
        <path d="M0 0 L0 -100" stroke="#1B5E20" stroke-width="4" fill="none" />
        <path d="M-20 -100 Q0 -140 20 -100 T0 -120 T-20 -100" fill="#8E24AA" />
    </g>
    
    <!-- Fireflies (Glowing elements) -->
    <g>
        <g class="firefly-glow">
            <circle cx="120" cy="650" r="15" fill="url(#firefly)" />
            <circle cx="120" cy="650" r="2.5" fill="#FEFF32" />
        </g>
        <g class="firefly-glow" style="animation-delay: -1s">
            <circle cx="850" cy="550" r="12" fill="url(#firefly)" />
            <circle cx="850" cy="550" r="2" fill="#FEFF32" />
        </g>
        <g class="firefly-glow" style="animation-delay: -2s">
            <circle cx="500" cy="400" r="18" fill="url(#firefly)" />
            <circle cx="500" cy="400" r="3" fill="#FEFF32" />
        </g>
        <g class="firefly-glow" style="animation-delay: -3s">
            <circle cx="300" cy="250" r="10" fill="url(#firefly)" />
            <circle cx="300" cy="250" r="1.5" fill="#FEFF32" />
        </g>
    </g>

    <!-- Soft glow over flowers base -->
    <rect y="700" width="1000" height="300" fill="#FFEE58" opacity="0.05" />

</svg>
