<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="forest-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4E342E" />
            <stop offset="100%" stop-color="#1B110E" />
        </radialGradient>
        <linearGradient id="sun-ray" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFF9C4" stop-opacity="0.2" />
            <stop offset="100%" stop-color="#FFF9C4" stop-opacity="0" />
        </linearGradient>
    </defs>

    <!-- Forest Base -->
    <rect width="1000" height="1000" fill="url(#forest-grad)" />

    <!-- Distant Forest Layer -->
    <path d="M0 600 Q150 450 300 550 T600 450 T900 580 T1000 600 V0 H0 Z" fill="#2E7D32" opacity="0.3" />
    <path d="M0 700 Q200 550 400 650 T700 550 T1000 700 V0 H0 Z" fill="#1B5E20" opacity="0.2" />

    <!-- Main Tree Trunks (Large/Thick) -->
    <!-- Left Trunk -->
    <path d="M-100 1000 Q150 500 -200 0" fill="#3E2723" opacity="0.9" />
    <path d="M-100 1000 Q120 500 -180 0" fill="#4E342E" opacity="0.5" />
    
    <!-- Right Trunk -->
    <path d="M1100 1000 Q850 500 1200 0" fill="#3D2B1F" opacity="0.9" />
    
    <!-- Heavy Canopy Shadow -->
    <rect width="1000" height="800" fill="#000" opacity="0.1" />

    <!-- Ferns/Leafy ground plants -->
    <g fill="#2E7D32" opacity="0.8">
        <path d="M100 950 Q150 900 200 950 T300 980" />
        <path d="M800 920 Q850 870 900 920 T1000 950" />
        <path d="M400 980 Q450 930 500 980 T600 990" />
    </g>

    <!-- Sunlight Rays (Dappled Light) -->
    <polygon points="100,-100 300,-150 700,1000 500,1050" fill="url(#sun-ray)" />
    <polygon points="400,-100 500,-120 900,1000 800,1050" fill="url(#sun-ray)" />
    
    <!-- Dappled Lightspots on floor -->
    <ellipse cx="400" cy="900" rx="60" ry="25" fill="#FFF9C4" opacity="0.08" />
    <ellipse cx="650" cy="950" rx="80" ry="35" fill="#FFF9C4" opacity="0.05" />
    <ellipse cx="200" cy="850" rx="40" ry="15" fill="#FFF9C4" opacity="0.06" />

    <!-- Mist/Dampness atmosphere -->
    <rect x="0" y="800" width="1000" height="200" fill="#E0F2F1" opacity="0.05" />
</svg>
