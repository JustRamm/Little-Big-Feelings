<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Tropical Jungle (Elephant Home) -->
    <rect width="1000" height="1000" fill="#E8F5E9" />
    
    <!-- Deep jungle Layers -->
    <path d="M-100 850 Q300 700 600 800 T1100 850" fill="#C8E6C9" opacity="0.8" />
    <path d="M-200 950 Q400 800 700 900 T1200 1000" fill="#81C784" />
    
    <!-- Refreshing Blue Pool -->
    <ellipse cx="500" cy="980" rx="450" ry="180" fill="#B3E5FC" />
    <ellipse cx="500" cy="980" rx="380" ry="140" fill="#4FC3F7" opacity="0.5" />
    
    <!-- Giant Tropical Leaves -->
    <path d="M100 600 Q150 400 300 500" stroke="#2E7D32" stroke-width="40" stroke-linecap="round" fill="none" opacity="0.7" />
    <path d="M900 600 Q850 400 700 500" stroke="#2E7D32" stroke-width="40" stroke-linecap="round" fill="none" opacity="0.7" />
    
    <!-- Falling Rainbow Drops (Water) -->
    <circle cx="800" cy="200" r="8" fill="#81D4FA" opacity="0.6" />
    <circle cx="820" cy="250" r="12" fill="#81D4FA" opacity="0.4" />
</svg>
