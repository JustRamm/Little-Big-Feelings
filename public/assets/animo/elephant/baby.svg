<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Elephant (Avatar 2 style) -->
    <!-- Small Round Body -->
    <path d="M50 110 Q35 110 30 95 Q30 80 50 80 Q70 80 70 95 Q70 110 50 110 Z" fill="#BBDEFB" stroke="#90CAF9" stroke-width="2" />
    <!-- Small Ears -->
    <ellipse cx="25" cy="55" rx="15" ry="20" fill="#90CAF9" />
    <ellipse cx="75" cy="55" rx="15" ry="20" fill="#90CAF9" />
    <!-- Head -->
    <circle cx="50" cy="55" r="30" fill="#BBDEFB" />
    <!-- Big Sparkly Eyes -->
    <circle cx="42" cy="50" r="5" fill="#212121" />
    <circle cx="58" cy="50" r="5" fill="#212121" />
    <circle cx="44" cy="48" r="2" fill="white" />
    <circle cx="60" cy="48" r="2" fill="white" />
    <!-- Tiny Trunk (Very short) -->
    <path d="M50 60 L50 70 Q50 75 45 75" fill="none" stroke="#BBDEFB" stroke-width="6" stroke-linecap="round" />
</svg>
