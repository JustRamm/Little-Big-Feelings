<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Panda (Avatar 4 style with body) -->
    <!-- Large Rounded Body -->
    <rect x="20" y="70" width="60" height="75" rx="30" fill="white" stroke="#212121" stroke-width="3" />
    <circle cx="20" cy="90" r="15" fill="#212121" /> <!-- Arm L -->
    <circle cx="80" cy="90" r="15" fill="#212121" /> <!-- Arm R -->
    <circle cx="35" cy="140" r="15" fill="#212121" /> <!-- Leg L -->
    <circle cx="65" cy="140" r="15" fill="#212121" /> <!-- Leg R -->
    
    <!-- Large Black Ears (Based on Avatar 4) -->
    <circle cx="25" cy="25" r="12" fill="#212121" />
    <circle cx="75" cy="25" r="12" fill="#212121" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 50px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
    </style>

    <!-- Head (Based on Avatar 4) -->
    <circle cx="50" cy="55" r="40" fill="white" stroke="#E0E0E0" stroke-width="2" />
    <!-- Eye patches (Based on Avatar 4) -->
    <ellipse cx="35" cy="50" rx="10" ry="12" fill="#212121" />
    <ellipse cx="65" cy="50" rx="10" ry="12" fill="#212121" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="35" cy="50" r="3" fill="white" />
        <circle cx="65" cy="50" r="3" fill="white" />
    </g>
    <!-- Nose -->
    <circle cx="50" cy="65" r="4" fill="#212121" />
</svg>
