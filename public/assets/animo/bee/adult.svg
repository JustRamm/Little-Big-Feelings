<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Bee (Avatar 11 style) -->
    <!-- Large Rounded Body -->
    <ellipse cx="50" cy="100" rx="45" ry="38" fill="#FFEB3B" stroke="#212121" stroke-width="3" />
    <!-- Bold Black Stripes -->
    <path d="M35 65 L35 135 M50 65 L50 135 M65 65 L65 135" stroke="#212121" stroke-width="12" />
    
    <style>
        .wing-left { animation: flap-left 0.2s ease-in-out infinite; transform-origin: 50px 65px; }
        .wing-right { animation: flap-right 0.2s ease-in-out infinite; transform-origin: 50px 65px; }
        @keyframes flap-left {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(45deg); }
        }
        @keyframes flap-right {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-45deg); }
        }
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 50px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
    </style>

    <!-- Wings (Symmetrical Flapping) -->
    <g class="wing-left">
        <ellipse cx="30" cy="65" rx="20" ry="15" fill="#E1F5FE" opacity="0.7" />
        <ellipse cx="35" cy="80" rx="15" ry="10" fill="#E1F5FE" opacity="0.6" />
    </g>
    <g class="wing-right">
        <ellipse cx="70" cy="65" rx="20" ry="15" fill="#E1F5FE" opacity="0.7" />
        <ellipse cx="65" cy="80" rx="15" ry="10" fill="#E1F5FE" opacity="0.6" />
    </g>
    
    <!-- Head -->
    <circle cx="50" cy="55" r="40" fill="#FFEB3B" stroke="#212121" stroke-width="2" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="30" cy="50" r="5" fill="#212121" />
        <circle cx="70" cy="50" r="5" fill="#212121" />
    </g>
    <!-- Mouth -->
    <path d="M44 70 Q50 78 56 70" fill="none" stroke="#212121" stroke-width="2" stroke-linecap="round" />
    
    <!-- Sturdy Antennae -->
    <path d="M48 30 Q35 0 25 15 M52 30 Q65 0 75 15" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- 6 Sturdy Legs -->
    <path d="M15 90 L5 100 M15 110 L5 120" stroke="#212121" stroke-width="3" stroke-linecap="round" />
    <path d="M85 90 L95 100 M85 110 L95 120" stroke="#212121" stroke-width="3" stroke-linecap="round" />
    <circle cx="35" cy="140" r="6" fill="#212121" />
    <circle cx="65" cy="140" r="6" fill="#212121" />
</svg>
