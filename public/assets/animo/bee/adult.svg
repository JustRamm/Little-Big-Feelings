<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Bee (Avatar 11 style with body) -->
    <!-- Large Rounded Body (Based on Avatar 11) -->
    <ellipse cx="50" cy="100" rx="45" ry="38" fill="#FFEB3B" stroke="#212121" stroke-width="3" />
    <!-- Bold Black Stripes (Based on Avatar 11) -->
    <path d="M35 65 L35 135 M50 65 L50 135 M65 65 L65 135" stroke="#212121" stroke-width="12" />
    
    <!-- Large Wings (Based on Avatar 11) -->
    <ellipse cx="30" cy="65" rx="20" ry="15" fill="#E1F5FE" opacity="0.7" />
    <ellipse cx="70" cy="65" rx="20" ry="15" fill="#E1F5FE" opacity="0.7" />
    
    <!-- Head (Based on Avatar 11 style) -->
    <circle cx="50" cy="55" r="40" fill="#FFEB3B" stroke="#212121" stroke-width="2" />
    <!-- Eye (Based on Avatar 11) -->
    <circle cx="70" cy="50" r="5" fill="#212121" />
    
    <!-- Sturdy Antennae -->
    <path d="M48 30 Q35 0 25 15 M52 30 Q65 0 75 15" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Fuzzy Feet -->
    <circle cx="35" cy="140" r="6" fill="#212121" />
    <circle cx="65" cy="140" r="6" fill="#212121" />
</svg>
