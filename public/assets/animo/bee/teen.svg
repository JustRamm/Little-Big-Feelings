<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Energetic Teen Bee (Avatar 11 style with body) -->
    <!-- Medium Body -->
    <ellipse cx="50" cy="95" rx="40" ry="32" fill="#FFEB3B" stroke="#212121" stroke-width="2.5" />
    <!-- Bold Stripes -->
    <path d="M40 65 L40 125 M60 65 L60 125" stroke="#212121" stroke-width="10" />
    <!-- Wings (Growing) -->
    <ellipse cx="35" cy="65" rx="15" ry="12" fill="#E1F5FE" opacity="0.6" />
    <ellipse cx="65" cy="65" rx="15" ry="12" fill="#E1F5FE" opacity="0.6" />
    <!-- Head -->
    <circle cx="50" cy="55" r="35" fill="#FFEB3B" />
    <!-- Happy Eyes -->
    <circle cx="50" cy="50" r="4.5" fill="#212121" />
    <circle cx="52" cy="48" r="2" fill="white" />
    <!-- Antennae Area -->
    <path d="M45 35 Q35 20 30 30 M55 35 Q65 20 70 30" stroke="#212121" stroke-width="2.5" fill="none" stroke-linecap="round" />
</svg>
