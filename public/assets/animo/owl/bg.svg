<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Cuter Whispering Forest (Owl Home) -->
    <rect width="1000" height="1000" fill="#E0F2F1" />
    
    <!-- Magical Moon Light (Cuter for Owl) -->
    <circle cx="850" cy="150" r="300" fill="#B2EBF2" opacity="0.3" filter="blur(60px)" />
    
    <!-- Gentle Forest Tree Layers -->
    <path d="M-100 850 Q300 750 600 820 T1100 850" fill="#80CBC4" opacity="0.6" />
    <path d="M-200 950 Q400 850 750 900 T1200 1000" fill="#4DB6AC" />
    
    <!-- Large Rounded Tree Trunk & Branch -->
    <rect x="850" y="0" width="150" height="1000" fill="#8D6E63" />
    <path d="M850 350 Q500 300 150 450" stroke="#8D6E63" stroke-width="60" stroke-linecap="round" fill="none" />
    
    <!-- Cuter Forest Leaves & Berries -->
    <circle cx="300" cy="420" r="60" fill="#AED581" opacity="0.6" />
    <circle cx="200" cy="450" r="40" fill="#AED581" opacity="0.4" />
    
    <!-- Tiny Red Berries -->
    <circle cx="250" cy="410" r="8" fill="#EF5350" />
    <circle cx="320" cy="440" r="8" fill="#EF5350" />
    
    <!-- Floating Fireflies (Sparkles) -->
    <circle cx="150" cy="250" r="8" fill="#FFF176" opacity="0.8" />
    <circle cx="500" cy="150" r="10" fill="#FFF176" opacity="0.6" />
</svg>
