<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Playful Teen Monkey (Avatar 7 style with body) -->
    <!-- Medium Body -->
    <path d="M50 120 Q30 120 30 95 L30 75 Q30 60 50 60 Q70 60 70 75 L70 95 Q70 120 50 120 Z" fill="#8D6E63" stroke="#5D4037" stroke-width="2.5" />
    <path d="M50 120 Q35 120 35 100 Q35 80 50 80 Q65 80 65 100 Q65 120 50 120 Z" fill="#D7CCC8" opacity="0.3" /> <!-- belly -->
    <!-- Medium Ears -->
    <circle cx="20" cy="50" r="12" fill="#8D6E63" />
    <circle cx="20" cy="50" r="6" fill="#D7CCC8" />
    <circle cx="80" cy="50" r="12" fill="#8D6E63" />
    <circle cx="80" cy="50" r="6" fill="#D7CCC8" />
    <!-- Head -->
    <circle cx="50" cy="55" r="38" fill="#8D6E63" />
    <ellipse cx="50" cy="62" rx="15" ry="10" fill="#D7CCC8" opacity="0.4" />
    <!-- Happy Eyes -->
    <circle cx="40" cy="50" r="4.5" fill="#212121" />
    <circle cx="60" cy="50" r="4.5" fill="#212121" />
    <!-- Growing Tail (Curled) -->
    <path d="M70 110 Q85 110 85 95 Q85 85 75 90" fill="none" stroke="#8D6E63" stroke-width="6" stroke-linecap="round" />
    <!-- Paws -->
    <circle cx="35" cy="118" r="10" fill="#8D6E63" stroke="#5D4037" stroke-width="2" />
    <circle cx="65" cy="118" r="10" fill="#8D6E63" stroke="#5D4037" stroke-width="2" />
</svg>
