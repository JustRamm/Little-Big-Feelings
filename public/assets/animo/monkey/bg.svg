<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Tropical Canopy (Monkey Home) -->
    <rect width="1000" height="1000" fill="#E8F5E9" />
    
    <!-- Deep jungle Canopy Layers -->
    <path d="M-100 850 Q300 750 600 820 T1100 850" fill="#81C784" opacity="0.8" />
    <path d="M-200 950 Q400 800 700 920 T1200 1000" fill="#2E7D32" />
    
    <!-- Thick Hanging Vines -->
    <path d="M100 0 Q150 400 100 800" fill="none" stroke="#795548" stroke-width="12" stroke-linecap="round" opacity="0.6" />
    <path d="M300 0 Q250 500 350 1000" fill="none" stroke="#795548" stroke-width="8" stroke-linecap="round" opacity="0.4" />
    <path d="M800 0 Q850 450 820 900" fill="none" stroke="#795548" stroke-width="12" stroke-linecap="round" opacity="0.6" />
    
    <!-- Giant Green Leaves Overhead -->
    <circle cx="200" cy="150" r="180" fill="#AED581" opacity="0.4" />
    <circle cx="850" cy="120" r="150" fill="#AED581" opacity="0.3" />
    
    <!-- Floating Jungle Sparks -->
    <circle cx="450" cy="300" r="8" fill="#FFEE58" opacity="0.4" filter="blur(5px)" />
</svg>
