<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Monkey (Avatar 7 style) -->
    <!-- Small Round Body -->
    <path d="M50 110 Q35 110 30 95 Q30 80 50 80 Q70 80 70 95 Q70 110 50 110 Z" fill="#8D6E63" />
    <path d="M50 110 Q42 110 40 100 Q40 90 50 90 Q60 90 60 100 Q60 110 50 110 Z" fill="#D7CCC8" opacity="0.4" /> <!-- belly -->
    <!-- Ear (Avatar 7 style) -->
    <circle cx="20" cy="55" r="10" fill="#8D6E63" />
    <circle cx="20" cy="55" r="5" fill="#D7CCC8" />
    <circle cx="80" cy="55" r="10" fill="#8D6E63" />
    <circle cx="80" cy="55" r="5" fill="#D7CCC8" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 50px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 3s infinite ease-in-out; transform-origin: 75px 105px; }
        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="55" r="32" fill="#8D6E63" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="42" cy="50" r="5" fill="#212121" />
        <circle cx="58" cy="50" r="5" fill="#212121" />
        <circle cx="44" cy="48" r="2" fill="white" />
        <circle cx="60" cy="48" r="2" fill="white" />
    </g>
    <!-- Muzzle -->
    <ellipse cx="50" cy="62" rx="12" ry="8" fill="#D7CCC8" />
    <circle cx="50" cy="62" r="2" fill="#212121" /> <!-- nose -->
    <!-- Tail -->
    <path class="tail-wag" d="M75 105 Q90 105 90 90" fill="none" stroke="#8D6E63" stroke-width="5" stroke-linecap="round" />
    <!-- 4 Little Paws -->
    <circle cx="35" cy="112" r="8" fill="#8D6E63" />
    <circle cx="65" cy="112" r="8" fill="#8D6E63" />
    <circle cx="28" cy="95" r="7" fill="#8D6E63" />
    <circle cx="72" cy="95" r="7" fill="#8D6E63" />
</svg>
