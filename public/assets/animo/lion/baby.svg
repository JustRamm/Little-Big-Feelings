<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Lion (Avatar 1 style) -->
    <!-- Small Body -->
    <path d="M50 110 Q40 110 35 95 Q35 80 50 80 Q65 80 65 95 Q65 110 50 110 Z" fill="#FFD54F" />
    <!-- Lion Tail -->
    <path class="tail-wag" d="M65 95 Q80 95 80 85" fill="none" stroke="#F57C00" stroke-width="4" stroke-linecap="round" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 45px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 5s infinite ease-in-out; transform-origin: 65px 105px; }
        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
    </style>

    <!-- Small Mane -->
    <circle cx="50" cy="50" r="35" fill="#F57C00" />
    <circle cx="50" cy="50" r="28" fill="#FFD54F" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="42" cy="45" r="5" fill="#3E2723" />
        <circle cx="58" cy="45" r="5" fill="#3E2723" />
        <circle cx="44" cy="43" r="2" fill="white" />
        <circle cx="60" cy="43" r="2" fill="white" />
    </g>
    <!-- Tiny Nose/Smile -->
    <path d="M47 55 L53 55 L50 60 Z" fill="#D81B60" />
    <!-- 4 Little Paws -->
    <circle cx="35" cy="108" r="7" fill="#FFD54F" />
    <circle cx="65" cy="108" r="7" fill="#FFD54F" />
    <circle cx="30" cy="95" r="6" fill="#FFD54F" />
    <circle cx="70" cy="95" r="6" fill="#FFD54F" />
</svg>
