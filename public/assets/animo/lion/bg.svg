<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="sky-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF9C4" />
            <stop offset="100%" stop-color="#FFECB3" />
        </radialGradient>
        <linearGradient id="cloud-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" />
            <stop offset="100%" stop-color="#fdfcf1" stop-opacity="0.8" />
        </linearGradient>
    </defs>

    <!-- Sky -->
    <rect width="1000" height="1000" fill="url(#sky-grad)" />

    <!-- Distance Clouds -->
    <g opacity="0.4">
        <circle cx="200" cy="150" r="50" fill="url(#cloud-grad)" />
        <circle cx="250" cy="150" r="40" fill="url(#cloud-grad)" />
        <circle cx="150" cy="150" r="30" fill="url(#cloud-grad)" />
        
        <circle cx="750" cy="80" r="60" fill="url(#cloud-grad)" />
        <circle cx="800" cy="80" r="50" fill="url(#cloud-grad)" />
        <circle cx="700" cy="80" r="40" fill="url(#cloud-grad)" />
    </g>

    <!-- Distant Hills -->
    <path d="M-100 700 Q300 550 600 650 T1100 700 V1000 H-100 Z" fill="#FFE082" opacity="0.6" />
    <path d="M-200 850 Q400 700 700 800 T1200 900 V1000 H-200 Z" fill="#FFD54F" opacity="0.5" />

    <!-- Foreground Hills -->
    <path d="M-300 950 Q500 750 1300 950 V1000 H-300 Z" fill="#FFA000" />
    
    <!-- Rocks/Kopjes -->
    <ellipse cx="150" cy="880" rx="80" ry="40" fill="#8D6E63" />
    <ellipse cx="200" cy="850" rx="60" ry="50" fill="#795548" />
    <ellipse cx="850" cy="920" rx="100" ry="40" fill="#6D4C41" />

    <!-- Acacia Trees -->
    <!-- Tree 1 (Small) -->
    <g transform="translate(150, 650) scale(0.5)">
        <rect x="0" y="0" width="15" height="200" fill="#3E2723" />
        <ellipse cx="7" cy="0" rx="150" ry="40" fill="#2E7D32" opacity="0.9" />
    </g>
    <!-- Tree 2 (Main) -->
    <g transform="translate(700, 750)">
        <rect x="0" y="0" width="20" height="250" fill="#3E2723" />
        <ellipse cx="10" cy="-20" rx="220" ry="50" fill="#1B5E20" opacity="0.95" />
        <ellipse cx="10" cy="-40" rx="180" ry="40" fill="#2E7D32" opacity="0.8" />
    </g>

    <!-- Grass Tufts -->
    <path d="M100 950 L110 930 L120 950 M250 960 L260 940 L270 960" stroke="#FFD54F" stroke-width="4" fill="none" opacity="0.7" />
    <path d="M400 970 L410 950 L420 970 M800 955 L810 935 L820 955" stroke="#FFA000" stroke-width="5" fill="none" opacity="0.8" />

    <!-- Watering Hole (Deeper Blue) -->
    <ellipse cx="500" cy="980" rx="450" ry="80" fill="#4FC3F7" opacity="0.4" />
    <ellipse cx="500" cy="980" rx="400" ry="60" fill="#03A9F4" opacity="0.3" />
</svg>
