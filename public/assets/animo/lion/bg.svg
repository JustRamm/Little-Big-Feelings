<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Savanna (Lion Home) -->
    <rect width="1000" height="1000" fill="#FFF9C4" />
    
    <!-- Golden Hills -->
    <path d="M-100 800 Q300 650 600 750 T1100 800" fill="#FFECB3" opacity="0.8" />
    <path d="M-200 900 Q400 750 700 850 T1200 950" fill="#FFD54F" />
    
    <!-- Watering Hole (Cuter) -->
    <ellipse cx="500" cy="950" rx="400" ry="150" fill="#B3E5FC" />
    <ellipse cx="500" cy="950" rx="350" ry="120" fill="#81D4FA" opacity="0.6" />
    
    <!-- Acacia Trees (Silhouettes) -->
    <rect x="150" y="600" width="15" height="200" fill="#3E2723" opacity="0.6" />
    <ellipse cx="157" cy="580" rx="80" ry="30" fill="#2E7D32" opacity="0.6" />
    
    <!-- Floating Gold Dust -->
    <circle cx="200" cy="200" r="10" fill="gold" opacity="0.3" filter="blur(10px)" />
    <circle cx="800" cy="300" r="15" fill="gold" opacity="0.4" filter="blur(10px)" />
</svg>
