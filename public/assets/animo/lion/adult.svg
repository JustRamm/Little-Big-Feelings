<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Lion (Avatar 1 style with body) -->
    <!-- Lion Tail (Background) -->
    <path class="tail-wag" d="M70 110 Q90 110 90 85" fill="none" stroke="#F57C00" stroke-width="8" stroke-linecap="round" />
    
    <!-- Large Body -->
    <rect x="20" y="70" width="60" height="70" rx="30" fill="#FFD54F" stroke="#F57C00" stroke-width="3" />
    <path d="M50 140 Q40 145 30 140 L30 110 Q30 90 50 90 Q70 90 70 110 L70 140 Q60 145 50 140 Z" fill="#F57C00" opacity="0.3" /> <!-- belly -->
    
    <!-- Full Majestic Mane (Based on Avatar 1) -->
    <circle cx="50" cy="50" r="48" fill="#F57C00" />
    <circle cx="50" cy="8" r="10" fill="#F57C00" />
    <circle cx="20" cy="18" r="10" fill="#F57C00" />
    <circle cx="80" cy="18" r="10" fill="#F57C00" />
    <circle cx="8" cy="50" r="10" fill="#F57C00" />
    <circle cx="92" cy="50" r="10" fill="#F57C00" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 45px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 4s infinite ease-in-out; transform-origin: 70px 110px; }
        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="50" r="35" fill="#FFD54F" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="38" cy="45" r="5" fill="#3E2723" />
        <circle cx="62" cy="45" r="5" fill="#3E2723" />
        <circle cx="40" cy="43" r="2" fill="white" />
        <circle cx="64" cy="43" r="2" fill="white" />
    </g>
    <!-- Muzzle Area -->
    <ellipse cx="50" cy="62" rx="12" ry="8" fill="#FFF9C4" />
    <path d="M46 58 L54 58 L50 63 Z" fill="#D81B60" />
    <!-- Large King Paws -->
    <circle cx="25" cy="140" r="12" fill="#FFD54F" stroke="#F57C00" stroke-width="2" />
    <circle cx="75" cy="140" r="12" fill="#FFD54F" stroke="#F57C00" stroke-width="2" />
    <circle cx="20" cy="105" r="12" fill="#FFD54F" stroke="#F57C00" stroke-width="2" />
    <circle cx="80" cy="105" r="12" fill="#FFD54F" stroke="#F57C00" stroke-width="2" />
</svg>
