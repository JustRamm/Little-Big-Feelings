<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Penguin (Avatar 3 style) -->
    <!-- Small Round Body -->
    <path d="M50 110 Q35 110 30 95 Q30 80 50 80 Q70 80 70 95 Q70 110 50 110 Z" fill="#263238" />
    <path d="M50 110 Q42 110 40 100 Q40 90 50 90 Q60 90 60 100 Q60 110 50 110 Z" fill="white" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 50px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="55" r="30" fill="#263238" />
    <ellipse cx="50" cy="62" rx="18" ry="20" fill="white" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="42" cy="50" r="5" fill="#263238" />
        <circle cx="58" cy="50" r="5" fill="#263238" />
        <circle cx="44" cy="48" r="2" fill="white" />
        <circle cx="60" cy="48" r="2" fill="white" />
    </g>
    <!-- Tiny Beak -->
    <path d="M48 60 L52 60 L50 64 Z" fill="#FFA000" />
    <!-- Little Flippers -->
    <path d="M30 85 Q15 75 20 100" fill="#263238" />
    <path d="M70 85 Q85 75 80 100" fill="#263238" />
    <!-- 2 Little Orange Feet -->
    <circle cx="40" cy="112" r="5" fill="#FFA000" />
    <circle cx="60" cy="112" r="5" fill="#FFA000" />
</svg>
