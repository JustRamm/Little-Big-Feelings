<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Penguin (Avatar 3 style with body) -->
    <!-- Large Rounded Body -->
    <rect x="20" y="70" width="60" height="75" rx="30" fill="#263238" stroke="#37474F" stroke-width="3" />
    <ellipse cx="50" cy="115" rx="25" ry="30" fill="white" />
    
    <!-- Flippers (Large) -->
    <path d="M20 85 Q0 70 5 110" fill="#263238" stroke="#37474F" stroke-width="2" />
    <path d="M80 85 Q100 70 95 110" fill="#263238" stroke="#37474F" stroke-width="2" />
    
    <!-- Head (Based on Avatar 3) -->
    <circle cx="50" cy="50" r="45" fill="#263238" stroke="#37474F" stroke-width="2" />
    <ellipse cx="50" cy="55" rx="30" ry="35" fill="white" />
    <!-- Eyes -->
    <circle cx="40" cy="45" r="4" fill="#263238" />
    <circle cx="60" cy="45" r="4" fill="#263238" />
    <!-- Beak -->
    <path d="M45 55 L55 55 L50 65 Z" fill="#FFA000" />
    
    <!-- Sturdy Orange Feet -->
    <circle cx="35" cy="140" r="10" fill="#FFA000" stroke="#EF6C00" stroke-width="2" />
    <circle cx="65" cy="140" r="10" fill="#FFA000" stroke="#EF6C00" stroke-width="2" />
</svg>
