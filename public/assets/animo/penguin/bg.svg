<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Arctic Iceberg (Penguin Home) -->
    <rect width="1000" height="1000" fill="#E1F5FE" />
    
    <!-- Iceberg Layers -->
    <path d="M-100 800 L400 400 L600 800 T1100 800" fill="#B3E5FC" opacity="0.6" />
    <path d="M-200 950 L500 500 L800 950 T1200 950" fill="white" stroke="#B3E5FC" stroke-width="5" />
    
    <!-- Deep Arctic Ocean -->
    <rect y="850" width="1000" height="150" fill="#0288D1" />
    <path d="M0 850 Q250 820 500 850 T1000 850" fill="#0288D1" />
    
    <!-- Floating Snowflakes -->
    <circle cx="200" cy="200" r="10" fill="white" opacity="0.4" />
    <circle cx="800" cy="300" r="15" fill="white" opacity="0.3" />
    
    <!-- Northern Lights (Soft Glow) -->
    <path d="M0 100 Q500 50 1000 100" stroke="#B2FF59" stroke-width="60" stroke-linecap="round" fill="none" opacity="0.2" filter="blur(40px)" />
</svg>
