<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="room-light" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF3E0" />
            <stop offset="100%" stop-color="#FFE0B2" />
        </radialGradient>
        <linearGradient id="window-sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#81D4FA" />
            <stop offset="100%" stop-color="#E1F5FE" />
        </linearGradient>
    </defs>

    <!-- Wall -->
    <rect width="1000" height="1000" fill="url(#room-light)" />

    <!-- Floor (Hardwood/Carpet) -->
    <path d="M0 700 L1000 700 V1000 H0 Z" fill="#D7CCC8" />
    <path d="M0 700 L1000 700 V720 H0 Z" fill="#000" opacity="0.05" />

    <!-- Window -->
    <rect x="350" y="100" width="300" height="400" fill="white" stroke="#A1887F" stroke-width="12" rx="10" />
    <rect x="360" y="110" width="280" height="380" fill="url(#window-sky)" />
    <!-- Window Cross -->
    <rect x="500" y="110" width="8" height="380" fill="#A1887F" opacity="0.4" />
    <rect x="360" y="300" width="280" height="8" fill="#A1887F" opacity="0.4" />
    <!-- Distant Cloud in window -->
    <circle cx="580" cy="180" r="25" fill="white" opacity="0.6" />
    <circle cx="610" cy="190" r="20" fill="white" opacity="0.6" />

    <!-- Sun Gleam in window -->
    <path d="M360 110 L480 110 L360 250 Z" fill="white" opacity="0.1" />

    <!-- Cozy Rug (Centered for focus) -->
    <ellipse cx="500" cy="880" rx="400" ry="120" fill="#F06292" opacity="0.8" />
    <ellipse cx="500" cy="880" rx="360" ry="100" fill="#EC407A" />
    <ellipse cx="500" cy="880" rx="340" ry="90" fill="none" stroke="#F48FB1" stroke-width="4" stroke-dasharray="20 10" />

    <!-- Yarn Ball (Right corner) -->
    <g transform="translate(850, 850)">
        <circle cx="0" cy="0" r="35" fill="#BA68C8" />
        <path d="M-25 -25 Q0 -40 25 -25 T25 25 T-25 25 T-25 -25" fill="none" stroke="#E1BEE7" stroke-width="3" opacity="0.6" />
        <path d="M-10 -35 Q-20 -50 -40 -40" fill="none" stroke="#BA68C8" stroke-width="4" />
    </g>

    <!-- Wall Decoration -->
    <rect x="50" y="150" width="120" height="150" fill="#F5F5F5" stroke="#795548" stroke-width="6" rx="4" />
    <path d="M70 240 Q110 200 150 240" fill="none" stroke="#795548" stroke-width="3" />
    <circle cx="110" cy="220" r="15" fill="#795548" opacity="0.3" />

</svg>
