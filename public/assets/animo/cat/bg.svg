<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Cuter Cozy Living Room Background (Cat Home) -->
    <rect width="1000" height="1000" fill="#FFF3E0" />
    
    <!-- Large Round Window -->
    <circle cx="500" cy="350" rx="350" ry="300" fill="#E1F5FE" />
    <path d="M150 350 L850 350 M500 50 L500 650" stroke="#FFE0B2" stroke-width="12" stroke-linecap="round" />
    
    <!-- Luxurious Plush Pink Rug -->
    <ellipse cx="500" cy="900" rx="450" ry="150" fill="#FF80AB" />
    <ellipse cx="500" cy="900" rx="380" ry="120" fill="#FFB8D1" opacity="0.4" />
    
    <!-- Floating Sparkles (Sunbeams) -->
    <circle cx="300" cy="200" r="10" fill="white" opacity="0.6" />
    <circle cx="700" cy="300" r="15" fill="white" opacity="0.4" />
    <circle cx="450" cy="150" r="8" fill="white" opacity="0.5" />
    
    <!-- Subtle Furniture Silhouette L -->
    <path d="M0 600 Q150 550 200 650 L200 1000 L0 1000 Z" fill="#D7CCC8" opacity="0.4" />
</svg>
