<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Cat (Avatar 5 style with body) -->
    <!-- Large Rounded Body -->
    <rect x="20" y="70" width="60" height="75" rx="30" fill="#FF8A65" stroke="#FFAB91" stroke-width="3" />
    <path d="M50 145 Q40 145 35 120 Q35 95 50 95 Q65 95 65 120 Q65 145 50 145 Z" fill="white" opacity="0.4" /> <!-- belly -->
    
    <!-- Pointy Ears (Based on Avatar 5) -->
    <path d="M20 30 L40 50 L15 60 Z" fill="#FFAB91" />
    <path d="M80 30 L60 50 L85 60 Z" fill="#FFAB91" />
    <!-- Head (Based on Avatar 5) -->
    <circle cx="50" cy="60" r="35" fill="#FF8A65" />
    <!-- Eyes -->
    <circle cx="40" cy="55" r="4" fill="#5D4037" />
    <circle cx="60" cy="55" r="4" fill="#5D4037" />
    <!-- Nose -->
    <circle cx="50" cy="65" r="3" fill="#D81B60" />
    <!-- Whiskers -->
    <path d="M30 65 L15 62 M30 68 L15 72 M70 65 L85 62 M70 68 L85 72" stroke="#5D4037" stroke-width="2" />
    
    <!-- Thick Fluffy Tail -->
    <path d="M80 110 Q105 110 105 85 Q105 60 85 70" fill="none" stroke="#FF8A65" stroke-width="12" stroke-linecap="round" />
    <!-- Sturdy Orange Paws -->
    <circle cx="35" cy="140" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
    <circle cx="65" cy="140" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
</svg>
