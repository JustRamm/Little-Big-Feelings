<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Curious Teen Kitten (Avatar 5 style with body) -->
    <!-- Medium Body -->
    <path d="M50 120 Q30 120 30 95 L30 75 Q30 60 50 60 Q70 60 70 75 L70 95 Q70 120 50 120 Z" fill="#FF8A65" stroke="#FFAB91" stroke-width="2.5" />
    <path d="M50 120 Q35 120 35 100 Q35 80 50 80 Q65 80 65 100 Q65 120 50 120 Z" fill="white" opacity="0.3" /> <!-- belly -->
    <!-- Medium Pointy Ears -->
    <path d="M25 35 L40 52 L18 60 Z" fill="#FFAB91" />
    <path d="M75 35 L60 52 L82 60 Z" fill="#FFAB91" />
    <!-- Head -->
    <circle cx="50" cy="58" r="32" fill="#FF8A65" />
    <!-- Happy Eyes -->
    <circle cx="40" cy="53" r="4.5" fill="#5D4037" />
    <circle cx="60" cy="53" r="4.5" fill="#5D4037" />
    <!-- Nose Area -->
    <circle cx="50" cy="63" r="2.5" fill="#D81B60" />
    <!-- Tail (Curled) -->
    <path d="M70 110 Q85 110 85 95 Q85 85 75 90" fill="none" stroke="#FF8A65" stroke-width="6" stroke-linecap="round" />
    <!-- Paws -->
    <circle cx="35" cy="115" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
    <circle cx="65" cy="115" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
</svg>
