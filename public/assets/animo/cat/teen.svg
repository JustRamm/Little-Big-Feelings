<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Curious Teen Kitten (Avatar 5 style with body) -->
    <!-- Medium Body -->
    <path d="M50 120 Q30 120 30 95 L30 75 Q30 60 50 60 Q70 60 70 75 L70 95 Q70 120 50 120 Z" fill="#FF8A65" stroke="#FFAB91" stroke-width="2.5" />
    <path d="M50 120 Q35 120 35 100 Q35 80 50 80 Q65 80 65 100 Q65 120 50 120 Z" fill="white" opacity="0.3" /> <!-- belly -->
    <!-- Medium Pointy Ears -->
    <path d="M25 35 L40 52 L18 60 Z" fill="#FFAB91" />
    <path d="M75 35 L60 52 L82 60 Z" fill="#FFAB91" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 53px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 3s infinite ease-in-out; transform-origin: 70px 110px; }
        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="58" r="32" fill="#FF8A65" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="40" cy="53" r="4.5" fill="#5D4037" />
        <circle cx="60" cy="53" r="4.5" fill="#5D4037" />
    </g>
    <!-- Nose Area -->
    <circle cx="50" cy="63" r="2.5" fill="#D81B60" />
    <!-- Mouth -->
    <path d="M48 66 Q50 69 52 66" stroke="#5D4037" stroke-width="1.2" fill="none" stroke-linecap="round" />
    <!-- Tail (Curled) -->
    <path class="tail-wag" d="M70 110 Q85 110 85 95 Q85 85 75 90" fill="none" stroke="#FF8A65" stroke-width="6" stroke-linecap="round" />
    <!-- Paws -->
    <circle cx="35" cy="115" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
    <circle cx="65" cy="115" r="10" fill="#FF8A65" stroke="#FFAB91" stroke-width="2" />
    <!-- Arms -->
    <circle cx="25" cy="90" r="8" fill="#FF8A65" stroke="#FFAB91" stroke-width="1.5" />
    <circle cx="75" cy="90" r="8" fill="#FF8A65" stroke="#FFAB91" stroke-width="1.5" />
</svg>
