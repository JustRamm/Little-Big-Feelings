<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Cute Baby Puppy (Avatar 6 style) -->
    <!-- Large Rounded Body -->
    <rect x="25" y="75" width="50" height="40" rx="20" fill="#A1887F" stroke="#795548" stroke-width="2" />
    <ellipse cx="50" cy="100" rx="15" ry="12" fill="white" opacity="0.3" /> <!-- belly -->
    
    <!-- Floppy Ears -->
    <rect x="22" y="45" width="12" height="30" rx="6" fill="#795548" />
    <rect x="66" y="45" width="12" height="30" rx="6" fill="#795548" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 50px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 2s infinite ease-in-out; transform-origin: 75px 100px; }
        @keyframes wag {
            0%, 50%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(20deg); }
            75% { transform: rotate(-10deg); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="55" r="32" fill="#A1887F" stroke="#795548" stroke-width="2" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="40" cy="50" r="5" fill="#212121" />
        <circle cx="60" cy="50" r="5" fill="#212121" />
        <circle cx="42" cy="48" r="2.5" fill="white" />
        <circle cx="62" cy="48" r="2.5" fill="white" />
    </g>
    <!-- Nose & Mouth -->
    <ellipse cx="50" cy="62" rx="4" ry="3" fill="#212121" />
    <path d="M46 68 Q50 75 54 68" fill="#FF80AB" stroke="#795548" stroke-width="0.5" />
    
    <!-- Tail -->
    <path class="tail-wag" d="M75 100 Q90 100 90 85" fill="none" stroke="#795548" stroke-width="6" stroke-linecap="round" />
    <!-- 4 Little Paws -->
    <circle cx="35" cy="118" r="8" fill="#A1887F" stroke="#795548" stroke-width="1.5" />
    <circle cx="65" cy="118" r="8" fill="#A1887F" stroke="#795548" stroke-width="1.5" />
    <circle cx="20" cy="95" r="7" fill="#A1887F" stroke="#795548" stroke-width="1.5" />
    <circle cx="80" cy="95" r="7" fill="#A1887F" stroke="#795548" stroke-width="1.5" />
</svg>
