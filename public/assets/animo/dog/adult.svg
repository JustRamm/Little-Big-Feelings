<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Dog (Avatar 6 style with body) -->
    <!-- Large Rounded Body -->
    <rect x="20" y="70" width="60" height="75" rx="30" fill="#A1887F" stroke="#795548" stroke-width="3" />
    <path d="M50 145 Q40 145 35 120 Q35 95 50 95 Q65 95 65 120 Q65 145 50 145 Z" fill="white" opacity="0.4" /> <!-- belly -->
    
    <!-- Floppy Ears (Based on Avatar 6) -->
    <rect x="15" y="35" width="20" height="40" rx="10" fill="#795548" />
    <rect x="65" y="35" width="20" height="40" rx="10" fill="#795548" />
    <!-- Head (Based on Avatar 6) -->
    <circle cx="50" cy="55" r="35" fill="#A1887F" />
    <!-- Eyes -->
    <circle cx="38" cy="48" r="4" fill="#212121" />
    <circle cx="62" cy="48" r="4" fill="#212121" />
    <!-- Nose -->
    <ellipse cx="50" cy="62" rx="6" ry="4" fill="#212121" />
    <!-- Tongue (Based on Avatar 6) -->
    <path d="M45 70 Q50 82 55 70" fill="#FF80AB" />
    
    <!-- Long Happy Tail -->
    <path d="M80 110 Q105 110 105 85" fill="none" stroke="#A1887F" stroke-width="12" stroke-linecap="round" />
    <!-- Sturdy Brown Paws -->
    <circle cx="35" cy="140" r="10" fill="#A1887F" stroke="#795548" stroke-width="2" />
    <circle cx="65" cy="140" r="10" fill="#A1887F" stroke="#795548" stroke-width="2" />
</svg>
