<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Cuter Clover Meadow (Rabbit Home) -->
    <rect width="1000" height="1000" fill="#E8F5E9" />
    
    <style>
        .plant-sway { animation: sway 7s infinite ease-in-out; transform-origin: center bottom; }
        .cloud-drift { animation: drift 20s infinite linear alternate; }
        @keyframes drift {
            from { transform: translateX(-50px); }
            to { transform: translateX(50px); }
        }
        .sun-pulse { animation: pulse 10s infinite alternate ease-in-out; transform-origin: 850px 150px; }
        @keyframes pulse {
            from { opacity: 0.3; transform: scale(1); }
            to { opacity: 0.5; transform: scale(1.1); }
        }
        @keyframes sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
    </style>

    <!-- Large Radiant Sun (Cuter) -->
    <circle class="sun-pulse" cx="850" cy="150" r="300" fill="#FFEE58" filter="blur(60px)" />
    <circle cx="850" cy="150" r="100" fill="#FFEE58" opacity="0.8" />
    
    <!-- Layered Pastel Hills -->
    <path d="M-100 850 Q300 650 600 780 T1100 850" fill="#C8E6C9" opacity="0.8" />
    <path d="M-200 950 Q400 800 750 880 T1200 1000" fill="#A5D6A7" />
    
    <!-- Clover Clusters & Little Daisy -->
    <g class="plant-sway">
        <circle cx="200" cy="880" r="12" fill="#43A047" />
        <circle cx="215" cy="880" r="12" fill="#43A047" />
        <circle cx="207" cy="895" r="12" fill="#43A047" />
    </g>
    
    <!-- White Daisy -->
    <g class="plant-sway">
        <circle cx="650" cy="920" r="15" fill="white" />
        <circle cx="630" cy="910" r="15" fill="white" />
        <circle cx="670" cy="910" r="15" fill="white" />
        <circle cx="650" cy="920" r="8" fill="#FFD54F" />
    </g>
    
    <!-- Fluffy Round Clouds Overhead -->
    <g class="cloud-drift">
        <circle cx="200" cy="200" r="80" fill="white" opacity="0.6" />
        <circle cx="300" cy="240" r="50" fill="white" opacity="0.5" />
    </g>
</svg>
