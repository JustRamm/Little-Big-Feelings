<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Curious Teen Rabbit (Avatar 8 style with body) -->
    <!-- Medium Body -->
    <path d="M50 120 Q30 120 30 95 L30 75 Q30 60 50 60 Q70 60 70 75 L70 95 Q70 120 50 120 Z" fill="white" stroke="#F8BBD0" stroke-width="2.5" />
    <path d="M50 120 Q35 120 35 100 Q35 80 50 80 Q65 80 65 100 Q65 120 50 120 Z" fill="#FCE4EC" opacity="0.3" /> <!-- belly -->
    <!-- Medium Upright Ears -->
    <ellipse cx="38" cy="40" rx="6" ry="18" fill="#FCE4EC" stroke="#F06292" stroke-width="2" />
    <ellipse cx="62" cy="40" rx="6" ry="18" fill="#FCE4EC" stroke="#F06292" stroke-width="2" />
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 60px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-wag { animation: wag 2s infinite ease-in-out; transform-origin: 72px 110px; }
        @keyframes wag {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }
    </style>

    <!-- Head -->
    <circle cx="50" cy="65" r="30" fill="white" stroke="#F8BBD0" stroke-width="2" />
    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="40" cy="60" r="4.5" fill="#212121" />
        <circle cx="60" cy="60" r="4.5" fill="#212121" />
    </g>
    <!-- Nose Area -->
    <path d="M48 68 L52 68 L50 71 Z" fill="#F06292" />
    <!-- Tiny Fluffy Tail -->
    <circle class="tail-wag" cx="72" cy="110" r="8" fill="white" stroke="#F8BBD0" stroke-width="1.5" />
    <circle cx="28" cy="110" r="8" fill="white" stroke="#F8BBD0" stroke-width="1.5" />
    <!-- Paws -->
    <circle cx="35" cy="118" r="10" fill="white" stroke="#F8BBD0" stroke-width="2" />
    <circle cx="65" cy="118" r="10" fill="white" stroke="#F8BBD0" stroke-width="2" />
</svg>
