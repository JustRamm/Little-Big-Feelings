<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Majestic Adult Rabbit (Avatar 8 style with body) -->
    <!-- Large Rounded Body -->
    <rect x="25" y="75" width="50" height="70" rx="25" fill="white" stroke="#F8BBD0" stroke-width="3" />
    <ellipse cx="50" cy="115" rx="20" ry="25" fill="#FCE4EC" opacity="0.4" /> <!-- belly -->
    
    <!-- Long Upright Ears (Based on Avatar 8) -->
    <ellipse cx="35" cy="25" rx="8" ry="25" fill="#FCE4EC" stroke="#F06292" stroke-width="2" />
    <ellipse cx="65" cy="25" rx="8" ry="25" fill="#FCE4EC" stroke="#F06292" stroke-width="2" />
    <!-- Head (Based on Avatar 8) -->
    <circle cx="50" cy="65" r="32" fill="white" stroke="#F8BBD0" stroke-width="2" />
    <!-- Eyes -->
    <circle cx="40" cy="60" r="4" fill="#212121" />
    <circle cx="60" cy="60" r="4" fill="#212121" />
    <!-- Nose -->
    <path d="M47 68 L53 68 L50 72 Z" fill="#F06292" />
    
    <!-- Large Fluffy Tail -->
    <circle cx="20" cy="110" r="12" fill="white" stroke="#F8BBD0" stroke-width="2" />
    <!-- Sturdy White Paws -->
    <circle cx="35" cy="140" r="12" fill="white" stroke="#F8BBD0" stroke-width="2" />
    <circle cx="65" cy="140" r="12" fill="white" stroke="#F8BBD0" stroke-width="2" />
</svg>
