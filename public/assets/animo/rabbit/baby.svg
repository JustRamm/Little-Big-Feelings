    <path d="M50 110 Q42 110 40 100 Q40 90 50 90 Q60 90 60 100 Q60 110 50 110 Z" fill="#FCE4EC" opacity="0.4" /> <!-- belly -->
    <!-- Tiny Ears -->
    <ellipse cx="40" cy="55" rx="4" ry="12" fill="#FCE4EC" stroke="#F06292" stroke-width="1.5" />
    <ellipse cx="60" cy="55" rx="4" ry="12" fill="#FCE4EC" stroke="#F06292" stroke-width="1.5" />
    <!-- Head -->
    <circle cx="50" cy="70" r="26" fill="white" stroke="#F8BBD0" stroke-width="1.5" />
    <!-- Big Sparkly Eyes -->
    <circle cx="42" cy="65" r="5" fill="#212121" />
    <circle cx="58" cy="65" r="5" fill="#212121" />
    <circle cx="44" cy="63" r="2" fill="white" />
    <circle cx="60" cy="63" r="2" fill="white" />
    <!-- Tiny Pink Nose -->
    <path d="M48 70 L52 70 L50 73 Z" fill="#F06292" />
</svg>
