<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tadpole (Frog larva) -->
    
    <!-- Swimming Tail -->
    <path class="tail-swimming" d="M50 80 Q60 100 50 115 Q40 100 50 80" fill="#81C784" opacity="0.6" stroke="#1B5E20" stroke-width="1" />
    
    <style>
        .eye-blink { animation: blink 5s infinite; transform-origin: 50% 52px; }
        @keyframes blink {
            0%, 94%, 100% { transform: scaleY(1); }
            97% { transform: scaleY(0.1); }
        }
        .tail-swimming { animation: swim 2s infinite ease-in-out; transform-origin: 50px 80px; }
        @keyframes swim {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
    </style>

    <!-- Head / Body -->
    <circle cx="50" cy="60" r="30" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2" />
    <ellipse cx="50" cy="70" rx="15" ry="10" fill="#E8F5E9" opacity="0.4" /> <!-- belly -->

    <!-- Eyes (Blinking) -->
    <g class="eye-blink">
        <circle cx="38" cy="52" r="8" fill="white" />
        <circle cx="62" cy="52" r="8" fill="white" />
        <circle cx="38" cy="52" r="4" fill="#1B5E20" />
        <circle cx="62" cy="52" r="4" fill="#1B5E20" />
    </g>
    
    <!-- Tiny Tadpole Mouth -->
    <path d="M44 75 Q50 80 56 75" stroke="#1B5E20" stroke-width="1.5" fill="none" stroke-linecap="round" />
</svg>
