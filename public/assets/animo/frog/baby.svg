<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Tiny Baby Frog (Avatar 9 style) -->
    <!-- Small Round Body -->
    <path d="M50 110 Q35 110 30 95 Q30 80 50 80 Q70 80 70 95 Q70 110 50 110 Z" fill="#A5D6A7" />
    <path d="M50 110 Q42 110 40 100 Q40 90 50 90 Q60 90 60 100 Q60 110 50 110 Z" fill="#E8F5E9" opacity="0.4" /> <!-- belly -->
    <!-- Head -->
    <ellipse cx="50" cy="65" rx="35" ry="25" fill="#A5D6A7" />
    <!-- Big Sparkly Eyes -->
    <circle cx="35" cy="55" r="10" fill="white" />
    <circle cx="65" cy="55" r="10" fill="white" />
    <circle cx="35" cy="55" r="5" fill="#1B5E20" />
    <circle cx="65" cy="55" r="5" fill="#1B5E20" />
    <circle cx="37" cy="53" r="2" fill="white" />
    <circle cx="67" cy="53" r="2" fill="white" />
    <!-- Tiny Smile -->
    <path d="M40 70 Q50 80 60 70" stroke="#1B5E20" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
