<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Magical Lily Pond (Frog Home) -->
    <rect width="1000" height="1000" fill="#E0F2F1" />
    
    <!-- Pond Water Layers -->
    <path d="M-100 850 Q300 750 600 820 T1100 850" fill="#80CBC4" opacity="0.8" />
    <path d="M-200 950 Q400 800 750 900 T1200 1000" fill="#4DB6AC" />
    
    <!-- Large Round Lily Pads -->
    <circle cx="200" cy="880" r="150" fill="#AED581" />
    <path d="M200 880 L350 780" stroke="#7DB342" stroke-width="8" stroke-linecap="round" />
    
    <circle cx="800" cy="920" r="180" fill="#AED581" />
    <path d="M800 920 L980 820" stroke="#7DB342" stroke-width="8" stroke-linecap="round" />
    
    <!-- Soft Sunlight Dust (Pond Glow) -->
    <circle cx="500" cy="300" r="400" fill="#FFEE58" opacity="0.1" filter="blur(60px)" />
    
    <!-- Floating Fireflies (Sparkles) -->
    <circle cx="150" cy="250" r="10" fill="#FFF176" opacity="0.8" />
    <circle cx="850" cy="150" r="15" fill="#FFF176" opacity="0.6" />
</svg>
