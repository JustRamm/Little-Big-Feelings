<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="pond-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#E0F7FA" />
            <stop offset="100%" stop-color="#80DEEA" />
        </radialGradient>
        <radialGradient id="lily-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#4CAF50" />
            <stop offset="100%" stop-color="#2E7D32" />
        </radialGradient>
    </defs>

    <!-- Pond Base -->
    <rect width="1000" height="1000" fill="url(#pond-grad)" />

    <!-- Distant Marsh Grass -->
    <path d="M0 200 Q150 150 300 180 T600 150 T900 190 T1000 200 V0 H0 Z" fill="#8BC34A" opacity="0.4" />
    <path d="M0 250 Q100 220 200 250 T500 230 T800 240 T1000 250 V0 H0 Z" fill="#689F38" opacity="0.3" />

    <!-- Pond Edges (Cattails/Reeds) -->
    <!-- Left Reeds -->
    <g stroke="#33691E" stroke-width="4">
        <path d="M100 1000 Q120 700 80 400" fill="none" />
        <path d="M120 1000 Q140 750 110 500" fill="none" />
        <path d="M150 1000 Q170 800 140 600" fill="none" />
        
        <path d="M850 1000 Q830 750 860 500" fill="none" />
        <path d="M880 1000 Q860 800 890 600" fill="none" />
        <path d="M910 1000 Q890 850 920 700" fill="none" />
    </g>

    <!-- Cattails (Cylinders on top) -->
    <ellipse cx="80" cy="400" rx="10" ry="30" fill="#5D4037" />
    <ellipse cx="110" cy="500" rx="10" ry="30" fill="#5D4037" />
    <ellipse cx="860" cy="500" rx="10" ry="30" fill="#5D4037" />
    <ellipse cx="890" cy="600" rx="10" ry="30" fill="#5D4037" />

    <!-- Lily Pads -->
    <!-- Large center (main focus) -->
    <g transform="translate(500, 750) scale(1.5) rotate(10)">
        <path d="M-100 0 A100 100 0 1 0 100 0 L0 0 Z" fill="url(#lily-grad)" stroke="#1B5E20" stroke-width="2" />
        <line x1="0" y1="0" x2="-60" y2="-40" stroke="#1B5E20" stroke-width="1" opacity="0.6" />
        <line x1="0" y1="0" x2="60" y2="-40" stroke="#1B5E20" stroke-width="1" opacity="0.6" />
        <line x1="0" y1="0" x2="0" y2="80" stroke="#1B5E20" stroke-width="1" opacity="0.6" />
    </g>

    <!-- Small lily pads around -->
    <path d="M200 800 A50 50 0 1 0 300 800 L250 800 Z" fill="url(#lily-grad)" opacity="0.8" transform="rotate(-30, 250, 800)" />
    <path d="M750 850 A40 40 0 1 0 830 850 L790 850 Z" fill="url(#lily-grad)" opacity="0.7" transform="rotate(45, 790, 850)" />
    <path d="M150 600 A45 45 0 1 0 240 600 L195 600 Z" fill="url(#lily-grad)" opacity="0.6" transform="rotate(150, 195, 600)" />

    <!-- Water Ripples -->
    <ellipse cx="500" cy="750" rx="200" ry="80" fill="none" stroke="white" stroke-width="2" opacity="0.15" />
    <ellipse cx="500" cy="750" rx="250" ry="100" fill="none" stroke="white" stroke-width="1" opacity="0.1" />
    
    <!-- Pond Bubbles -->
    <circle cx="420" cy="700" r="5" fill="white" opacity="0.2" />
    <circle cx="435" cy="715" r="3" fill="white" opacity="0.1" />
    <circle cx="580" cy="780" r="4" fill="white" opacity="0.2" />
</svg>
