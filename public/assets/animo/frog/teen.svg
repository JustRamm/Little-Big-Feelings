<svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
    <!-- Playful Teen Frog (Avatar 9 style with body) -->
    <!-- Medium Body -->
    <path d="M50 120 Q30 120 30 95 L30 75 Q30 60 50 60 Q70 60 70 75 L70 95 Q70 120 50 120 Z" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2.5" />
    <path d="M50 120 Q35 120 35 100 Q35 80 50 80 Q65 80 65 100 Q65 120 50 120 Z" fill="#E8F5E9" opacity="0.3" /> <!-- belly -->
    <!-- Head -->
    <ellipse cx="50" cy="55" rx="45" ry="32" fill="#A5D6A7" />
    <!-- Happy Eyes -->
    <circle cx="35" cy="40" r="14" fill="white" />
    <circle cx="65" cy="40" r="14" fill="white" />
    <circle cx="35" cy="40" r="6" fill="#1B5E20" />
    <circle cx="65" cy="40" r="6" fill="#1B5E20" />
    <!-- Smile Area -->
    <path d="M30 65 Q50 82 70 65" stroke="#1B5E20" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Small Jumping Legs -->
    <path d="M25 110 Q10 90 15 120" stroke="#1B5E20" stroke-width="6" stroke-linecap="round" fill="none" />
    <path d="M75 110 Q90 90 85 120" stroke="#1B5E20" stroke-width="6" stroke-linecap="round" fill="none" />
    <!-- Paws -->
    <circle cx="35" cy="122" r="8" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2" />
    <circle cx="65" cy="122" r="8" fill="#A5D6A7" stroke="#1B5E20" stroke-width="2" />
</svg>
