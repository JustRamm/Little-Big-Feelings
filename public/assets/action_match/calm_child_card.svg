<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <!-- Card base white border -->
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <!-- Card inner background - soft mint green -->
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#E8F5E9"/>

  <!-- LABEL -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#A5D6A7"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1B5E20" text-anchor="middle">Take a Deep Breath</text>

  <!-- Iridescent bubbles floating up -->
  <!-- Large bubble -->
  <circle cx="285" cy="130" r="38" fill="white" fill-opacity="0.3" stroke="url(#bubbleGrad1)" stroke-width="5"/>
  <ellipse cx="272" cy="118" rx="10" ry="6" fill="white" opacity="0.5" transform="rotate(-30 272 118)"/>
  <!-- Medium bubble -->
  <circle cx="315" cy="215" r="26" fill="white" fill-opacity="0.3" stroke="url(#bubbleGrad2)" stroke-width="4"/>
  <ellipse cx="306" cy="207" rx="6" ry="4" fill="white" opacity="0.5" transform="rotate(-30 306 207)"/>
  <!-- Small bubble -->
  <circle cx="270" cy="285" r="18" fill="white" fill-opacity="0.3" stroke="url(#bubbleGrad3)" stroke-width="3"/>
  <ellipse cx="264" cy="279" rx="4" ry="3" fill="white" opacity="0.5"/>
  <!-- Tiny bubble -->
  <circle cx="300" cy="170" r="12" fill="white" fill-opacity="0.3" stroke="url(#bubbleGrad1)" stroke-width="3"/>

  <defs>
    <linearGradient id="bubbleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="50%" stop-color="#80DEEA"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="bubbleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="bubbleGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>

  <!-- Cross-legged body / legs on floor -->
  <!-- Floor shadow -->
  <ellipse cx="200" cy="430" rx="115" ry="14" fill="#C8E6C9" opacity="0.8"/>
  <!-- Legs crossed -->
  <path d="M115 390 Q140 360 200 370 Q260 360 285 390 Q260 415 200 410 Q140 415 115 390Z" fill="#81C784" stroke="#388E3C" stroke-width="6"/>
  <!-- Feet peeking out -->
  <ellipse cx="117" cy="402" rx="22" ry="14" fill="#FFCC80" stroke="#E65100" stroke-width="4"/>
  <ellipse cx="283" cy="402" rx="22" ry="14" fill="#FFCC80" stroke="#E65100" stroke-width="4"/>

  <!-- Body / shirt -->
  <path d="M148 350 Q140 300 155 275 L200 262 L245 275 Q260 300 252 350 Z" fill="#81C784" stroke="#388E3C" stroke-width="6"/>

  <!-- Head -->
  <ellipse cx="200" cy="230" rx="68" ry="72" fill="#FFCC80" stroke="#E65100" stroke-width="6"/>

  <!-- Hair - ponytail style -->
  <path d="M138 210 Q132 155 175 140 Q200 134 225 140 Q268 155 262 210" fill="#4E342E" stroke="#3E2723" stroke-width="4"/>
  <circle cx="140" cy="200" r="12" fill="#4E342E"/>
  <circle cx="260" cy="200" r="12" fill="#4E342E"/>
  <path d="M262 175 Q285 155 278 130 Q272 145 258 140" fill="#4E342E" stroke="#3E2723" stroke-width="3"/>

  <!-- Eyes — happy, gently closed -->
  <path d="M175 226 Q185 214 196 224" stroke="#4E342E" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M204 224 Q215 214 225 226" stroke="#4E342E" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Cheek blush -->
  <ellipse cx="158" cy="248" rx="17" ry="11" fill="#F48FB1" opacity="0.45"/>
  <ellipse cx="242" cy="248" rx="17" ry="11" fill="#F48FB1" opacity="0.45"/>

  <!-- Mouth — puffed cheeks blowing -->
  <ellipse cx="200" cy="262" rx="22" ry="15" fill="#FFCC80" stroke="#E65100" stroke-width="3"/>
  <ellipse cx="200" cy="262" rx="14" ry="9" fill="#FFB74D"/>
  <!-- Blow direction line -->
  <path d="M222 258 Q245 252 260 255" stroke="#E65100" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="5,4"/>

  <!-- Arms in meditation pose / resting on knees -->
  <path d="M145 310 Q120 355 115 390" stroke="#FFCC80" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M255 310 Q280 355 285 390" stroke="#FFCC80" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Small sparkle near bubbles -->
  <path d="M250 100 L254 90 L258 100 L250 96 Z" fill="#FFD54F"/>
  <path d="M250 100 L260 104 L250 108 L254 100 Z" fill="#FFD54F"/>
</svg>
