<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <!-- Card base white border -->
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <!-- Card inner background - light blue -->
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#E3F2FD"/>

  <!-- LABEL -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#90CAF9"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="22" font-weight="bold" fill="#0D47A1" text-anchor="middle">Feeling Sad</text>

  <!-- Rain cloud -->
  <ellipse cx="200" cy="95" rx="65" ry="38" fill="#B0BEC5" stroke="#607D8B" stroke-width="5"/>
  <circle cx="162" cy="100" r="28" fill="#B0BEC5" stroke="#607D8B" stroke-width="5"/>
  <circle cx="238" cy="100" r="28" fill="#B0BEC5" stroke="#607D8B" stroke-width="5"/>
  <ellipse cx="200" cy="80" rx="45" ry="32" fill="#90A4AE" stroke="#607D8B" stroke-width="4"/>
  <!-- Raindrops -->
  <path d="M175 130 Q173 145 175 155 Q177 145 175 130Z" fill="#42A5F5"/>
  <path d="M200 140 Q198 155 200 165 Q202 155 200 140Z" fill="#42A5F5"/>
  <path d="M225 130 Q223 145 225 155 Q227 145 225 130Z" fill="#42A5F5"/>
  <path d="M188 155 Q186 168 188 177 Q190 168 188 155Z" fill="#64B5F6"/>
  <path d="M213 150 Q211 163 213 172 Q215 163 213 150Z" fill="#64B5F6"/>

  <!-- Body / Shirt -->
  <path d="M140 370 Q140 310 160 295 L200 285 L240 295 Q260 310 260 370 Z" fill="#EF9A9A" stroke="#E57373" stroke-width="5"/>

  <!-- Head -->
  <ellipse cx="200" cy="250" rx="72" ry="78" fill="#FFCC80" stroke="#E65100" stroke-width="6"/>

  <!-- Hair — dark, curly top -->
  <path d="M134 230 Q130 175 180 158 Q200 152 220 158 Q268 175 266 230" fill="#5D4037" stroke="#3E2723" stroke-width="4"/>
  <circle cx="138" cy="220" r="12" fill="#5D4037"/>
  <circle cx="262" cy="220" r="12" fill="#5D4037"/>

  <!-- Eyes — big and watery -->
  <ellipse cx="175" cy="245" rx="18" ry="20" fill="white" stroke="#4E342E" stroke-width="4"/>
  <ellipse cx="225" cy="245" rx="18" ry="20" fill="white" stroke="#4E342E" stroke-width="4"/>
  <circle cx="175" cy="248" r="9" fill="#3E2723"/>
  <circle cx="225" cy="248" r="9" fill="#3E2723"/>
  <circle cx="171" cy="244" r="3" fill="white"/>
  <circle cx="221" cy="244" r="3" fill="white"/>
  <!-- Shiny watery eyes overlay -->
  <ellipse cx="175" cy="258" rx="18" ry="10" fill="#90CAF9" opacity="0.5"/>
  <ellipse cx="225" cy="258" rx="18" ry="10" fill="#90CAF9" opacity="0.5"/>

  <!-- Big tears running down -->
  <path d="M165 265 Q158 285 162 305 Q168 285 165 265Z" fill="#42A5F5"/>
  <path d="M238 265 Q245 285 241 305 Q235 285 238 265Z" fill="#42A5F5"/>

  <!-- Sad frown mouth -->
  <path d="M178 288 Q200 274 222 288" stroke="#BF360C" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="155" cy="275" rx="16" ry="10" fill="#EF9A9A" opacity="0.5"/>
  <ellipse cx="245" cy="275" rx="16" ry="10" fill="#EF9A9A" opacity="0.5"/>

  <!-- Arms -->
  <line x1="140" y1="320" x2="110" y2="370" stroke="#FFCC80" stroke-width="18" stroke-linecap="round"/>
  <line x1="260" y1="320" x2="290" y2="370" stroke="#FFCC80" stroke-width="18" stroke-linecap="round"/>
</svg>
