<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft colorful gradient background -->
  <rect width="1920" height="1080" fill="#E1F5FE"/>
  <rect width="1920" height="1080" fill="url(#az_grad)" opacity="0.4"/>
  
  <defs>
    <linearGradient id="az_grad" x1="0" y1="0" x2="1920" y2="1080">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="50%" stop-color="#F06292"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
  </defs>

  <!-- Large floating letters for child-friendly A-Z theme -->
  <g opacity="0.15" font-family="Outfit, sans-serif" font-weight="900">
    <text x="100" y="200" font-size="200" fill="#FF80AB" transform="rotate(-15 100 200)">A</text>
    <text x="1600" y="300" font-size="250" fill="#4FC3F7" transform="rotate(20 1600 300)">B</text>
    <text x="300" y="850" font-size="220" fill="#AED581" transform="rotate(10 300 850)">C</text>
    <text x="1400" y="900" font-size="180" fill="#FFD54F" transform="rotate(-25 1400 900)">Z</text>
    <text x="900" y="100" font-size="150" fill="#CE93D8" transform="rotate(45 900 100)">H</text>
    <text x="700" y="1000" font-size="190" fill="#FF8A65" transform="rotate(-10 700 1000)">K</text>
  </g>

  <!-- Fluffy Clouds -->
  <g fill="white" opacity="0.5">
    <circle cx="200" cy="400" r="100"/>
    <circle cx="300" cy="450" r="120"/>
    <circle cx="400" cy="400" r="100"/>
    
    <circle cx="1600" cy="700" r="80"/>
    <circle cx="1680" cy="740" r="100"/>
    <circle cx="1760" cy="700" r="80"/>
  </g>

  <!-- Colorful Circles / Bubbles -->
  <circle cx="800" cy="500" r="20" fill="#FF80AB" opacity="0.6"/>
  <circle cx="400" cy="200" r="15" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="1200" cy="800" r="25" fill="#FFD54F" opacity="0.6"/>
  <circle cx="1100" cy="200" r="18" fill="#AED581" opacity="0.6"/>
  <circle cx="1500" cy="150" r="22" fill="#CE93D8" opacity="0.6"/>
</svg>
