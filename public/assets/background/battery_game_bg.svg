<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Energy field background -->
  <rect width="1920" height="1080" fill="#FFF9E6"/>
  <rect width="1920" height="1080" fill="url(#battery_grad)" opacity="0.4"/>
  
  <defs>
    <radialGradient id="battery_grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </radialGradient>
  </defs>

  <!-- Glowing Energy Orbs -->
  <g opacity="0.4">
    <circle cx="200" cy="200" r="150" fill="#FFF176" filter="blur(40px)">
      <animate attributeName="r" values="150;180;150" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="1700" cy="900" r="200" fill="#4FC3F7" filter="blur(50px)">
      <animate attributeName="r" values="200;230;200" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="960" cy="540" r="300" fill="#FFFFFF" opacity="0.3" filter="blur(60px)"/>
  </g>

  <!-- Sparkles / Power Particles -->
  <g fill="#FFD54F">
    <circle cx="400" cy="150" r="5"/>
    <circle cx="1500" cy="100" r="8"/>
    <circle cx="300" cy="800" r="6"/>
    <circle cx="1600" cy="400" r="10"/>
    <circle cx="900" cy="900" r="7"/>
    <circle cx="1200" cy="150" r="4"/>
  </g>

  <!-- Flowing Energy Lines -->
  <path d="M-100 500 Q400 300 960 500 T2020 500" stroke="#80DEEA" stroke-width="4" stroke-dasharray="10 20" opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="300" dur="10s" repeatCount="indefinite" />
  </path>
  <path d="M-100 600 Q400 800 960 600 T2020 600" stroke="#FFF176" stroke-width="6" stroke-dasharray="15 25" opacity="0.2">
    <animate attributeName="stroke-dashoffset" from="0" to="-400" dur="12s" repeatCount="indefinite" />
  </path>
</svg>
