<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card frame -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#FFF3E0"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#FFB74D"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">Overwhelmed</text>

  <!-- Illustration: Pile of letters/tasks/bubbles -->
  <!-- Falling papers/bubbles from "Circle of Concern" -->
  <rect x="120" y="100" width="120" height="150" rx="10" fill="white" stroke="#B0BEC5" stroke-width="4" transform="rotate(-15, 180, 175)"/>
  <rect x="160" y="120" width="120" height="150" rx="10" fill="white" stroke="#B0BEC5" stroke-width="4" transform="rotate(10, 220, 195)"/>
  <rect x="140" y="140" width="120" height="150" rx="10" fill="white" stroke="#607D8B" stroke-width="5"/>
  
  <!-- Scribbles on the top paper -->
  <rect x="160" y="170" width="60" height="6" rx="3" fill="#B0BEC5"/>
  <rect x="160" y="185" width="80" height="6" rx="3" fill="#B0BEC5"/>
  <rect x="160" y="200" width="50" height="6" rx="3" fill="#B0BEC5"/>
  <rect x="160" y="215" width="70" height="6" rx="3" fill="#B0BEC5"/>

  <!-- Character looking buried/panicked -->
  <circle cx="200" cy="330" r="45" fill="#FFCC80" stroke="#EF6C00" stroke-width="4"/>
  <circle cx="185" cy="325" r="5" fill="#333"/>
  <circle cx="215" cy="325" r="5" fill="#333"/>
  <path d="M190 350 Q200 340 210 350" stroke="#BF360C" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- "Circle of Concern" bubbles floating -->
  <circle cx="100" cy="150" r="25" fill="#90CAF9" opacity="0.4" stroke="#42A5F5" stroke-width="2"/>
  <circle cx="300" cy="180" r="30" fill="#EF9A9A" opacity="0.4" stroke="#EF5350" stroke-width="2"/>
  <circle cx="100" cy="280" r="20" fill="#FFF59D" opacity="0.4" stroke="#FBC02D" stroke-width="2"/>
</svg>
