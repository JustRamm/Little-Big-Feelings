  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#FFF9C4"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#FBC02D"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="22" font-weight="bold" fill="#5D4037" text-anchor="middle">Feeling Joyful</text>

  <!-- Golden Trophy illustration -->
  <!-- Sparkles -->
  <text x="100" y="140" font-size="30" fill="#FBC02D">✦</text>
  <text x="300" y="160" font-size="24" fill="#FBC02D">✦</text>
  <text x="120" y="320" font-size="20" fill="#FBC02D">✦</text>

  <!-- Cup -->
  <path d="M130 150 L270 150 Q270 250 200 250 Q130 250 130 150 Z" fill="#FFD54F" stroke="#F57F17" stroke-width="7"/>
