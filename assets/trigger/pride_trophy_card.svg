  <!-- Handles -->
  <path d="M130 180 Q90 180 90 215 Q90 240 130 240" stroke="#F57F17" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M270 180 Q310 180 310 215 Q310 240 270 240" stroke="#F57F17" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Stem & Base -->
