<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card frame -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#FCE4EC"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#F06292"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="20" font-weight="bold" fill="#880E4F" text-anchor="middle">Feeling Anxious</text>

  <!-- Illustration: Scared peeking out -->
  <!-- Dark background -->
  <rect x="80" y="120" width="240" height="200" rx="30" fill="#311B92" stroke="#1A237E" stroke-width="6"/>
  
  <!-- "Blanket" edge -->
  <path d="M80 250 Q200 220 320 250 L320 320 L80 320 Z" fill="#F8BBD0"/>
  
  <!-- Eyes peeking from dark -->
  <ellipse cx="160" cy="200" rx="20" ry="22" fill="white"/>
  <ellipse cx="240" cy="200" rx="20" ry="22" fill="white"/>
  <circle cx="165" cy="203" r="10" fill="#1A237E"/>
  <circle cx="245" cy="203" r="10" fill="#1A237E"/>
  
  <!-- Worried brow shadows -->
  <path d="M140 170 Q160 155 180 165" stroke="#9575CD" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M220 165 Q240 155 260 170" stroke="#9575CD" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Glowing stars of fear -->
  <text x="100" y="160" font-size="16" fill="#FFF176" opacity="0.6">✦</text>
  <text x="300" y="200" font-size="20" fill="#FFF176" opacity="0.6">✦</text>
  <text x="140" y="280" font-size="22" fill="#F06292">★</text>
</svg>
