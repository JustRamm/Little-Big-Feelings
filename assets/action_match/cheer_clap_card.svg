<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card frame -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#C8E6C9"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#81C784"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="20" font-weight="bold" fill="#1B5E20" text-anchor="middle">Celebrate!</text>

  <!-- Illustration: Cheering monster -->
  <rect x="150" y="320" width="100" height="90" rx="30" fill="#81C784"/>
  
  <ellipse cx="200" cy="240" rx="85" ry="85" fill="#A5D6A7" stroke="#388E3C" stroke-width="6"/>
  
  <!-- Happy eyes -->
  <ellipse cx="170" cy="230" rx="14" ry="16" fill="white" stroke="#1B5E20" stroke-width="3"/>
  <ellipse cx="230" cy="230" rx="14" ry="16" fill="white" stroke="#1B5E20" stroke-width="3"/>
  <circle cx="170" cy="233" r="8" fill="#1B5E20"/>
  <circle cx="230" cy="233" r="8" fill="#1B5E20"/>
  
  <!-- Big happy smile -->
  <path d="M165 275 Q200 310 235 275" stroke="#1B5E20" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Hands raised in joy -->
  <path d="M110 240 Q80 210 90 180" stroke="#81C784" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M290 240 Q320 210 310 180" stroke="#81C784" stroke-width="18" stroke-linecap="round" fill="none"/>
  
  <!-- Confetti/Sparkles -->
  <text x="100" y="140" font-size="24" fill="#FFEB3B">★</text>
  <text x="300" y="140" font-size="24" fill="#FFEB3B">★</text>
  <text x="200" y="100" font-size="20" fill="#FFEB3B">★</text>
</svg>
