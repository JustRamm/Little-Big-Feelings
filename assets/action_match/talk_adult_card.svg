<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card frame -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#E3F2FD"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#4FC3F7"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="18" font-weight="bold" fill="#01579B" text-anchor="middle">Use I-Messages</text>

  <!-- Speech bubble from child -->
  <path d="M90 150 Q90 110 130 110 L300 110 Q340 110 340 150 L340 210 Q340 250 300 250 L210 250 L190 280 L185 250 L130 250 Q90 250 90 210 Z" fill="white" stroke="#4FC3F7" stroke-width="6"/>
  <!-- I-message text -->
  <text x="215" y="155" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">I feel...</text>
  <text x="215" y="183" font-family="Arial, sans-serif" font-size="15" fill="#0D47A1" text-anchor="middle">when you...</text>
  <text x="215" y="208" font-family="Arial, sans-serif" font-size="15" fill="#0D47A1" text-anchor="middle">I need...</text>

  <!-- Child figure speaking -->
  <!-- Body -->
  <rect x="148" y="318" width="70" height="80" rx="18" fill="#FF80AB"/>
  <!-- Head -->
  <circle cx="183" cy="298" r="44" fill="#FFCC80" stroke="#FFB74D" stroke-width="4"/>
  <!-- Hair -->
  <path d="M142 285 Q150 248 183 242 Q216 248 224 285" fill="#4A148C"/>
  <!-- Eyes (looking to speech bubble - slightly left) -->
  <circle cx="170" cy="295" r="8" fill="#333"/>
  <circle cx="196" cy="295" r="8" fill="#333"/>
  <circle cx="172" cy="293" r="3" fill="white"/>
  <circle cx="198" cy="293" r="3" fill="white"/>
  <!-- Friendly smile -->
  <path d="M167 315 Q183 328 199 315" stroke="#BF360C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Arm raised -->
  <path d="M218 335 Q250 310 270 290" stroke="#FFCC80" stroke-width="18" fill="none" stroke-linecap="round"/>
  <circle cx="272" cy="286" r="12" fill="#FFCC80" stroke="#FFB74D" stroke-width="3"/>
</svg>
