<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <!-- Card base white border -->
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <!-- Card inner background - warm red-orange tint -->
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#FBE9E7"/>

  <!-- LABEL -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#EF9A9A"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="22" font-weight="bold" fill="#B71C1C" text-anchor="middle">Feeling Angry</text>

  <!-- Steam from left ear -->
  <path d="M95 180 Q75 160 85 135 Q95 112 78 92" stroke="#BDBDBD" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M80 170 Q58 148 70 120 Q82 95 65 72" stroke="#E0E0E0" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Steam from right ear -->
  <path d="M305 180 Q325 160 315 135 Q305 112 322 92" stroke="#BDBDBD" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M320 170 Q342 148 330 120 Q318 95 335 72" stroke="#E0E0E0" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Monster body (fluffy round shape) -->
  <!-- Fur bumps around edge -->
  <circle cx="120" cy="160" r="30" fill="#EF5350"/>
  <circle cx="80"  cy="220" r="26" fill="#EF5350"/>
  <circle cx="90"  cy="310" r="28" fill="#EF5350"/>
  <circle cx="140" cy="370" r="28" fill="#EF5350"/>
  <circle cx="200" cy="390" r="30" fill="#EF5350"/>
  <circle cx="260" cy="370" r="28" fill="#EF5350"/>
  <circle cx="310" cy="310" r="28" fill="#EF5350"/>
  <circle cx="320" cy="220" r="26" fill="#EF5350"/>
  <circle cx="280" cy="160" r="30" fill="#EF5350"/>
  <circle cx="200" cy="140" r="32" fill="#EF5350"/>
  <!-- Main body circle -->
  <circle cx="200" cy="275" r="140" fill="#EF5350"/>
  <!-- Outline -->
  <circle cx="200" cy="275" r="140" stroke="#B71C1C" stroke-width="7" fill="none"/>

  <!-- Angry eyebrows -->
  <path d="M148 210 L188 228" stroke="#B71C1C" stroke-width="9" stroke-linecap="round"/>
  <path d="M212 228 L252 210" stroke="#B71C1C" stroke-width="9" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="168" cy="245" rx="22" ry="22" fill="white" stroke="#B71C1C" stroke-width="5"/>
  <ellipse cx="232" cy="245" rx="22" ry="22" fill="white" stroke="#B71C1C" stroke-width="5"/>
  <circle cx="168" cy="248" r="11" fill="#212121"/>
  <circle cx="232" cy="248" r="11" fill="#212121"/>
  <circle cx="164" cy="243" r="4" fill="white"/>
  <circle cx="228" cy="243" r="4" fill="white"/>

  <!-- Angry mouth (gritting teeth) -->
  <path d="M158 300 Q200 330 242 300" stroke="#B71C1C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <rect x="166" y="300" width="16" height="15" rx="3" fill="white" stroke="#B71C1C" stroke-width="2"/>
  <rect x="190" y="300" width="16" height="15" rx="3" fill="white" stroke="#B71C1C" stroke-width="2"/>
  <rect x="218" y="300" width="16" height="15" rx="3" fill="white" stroke="#B71C1C" stroke-width="2"/>

  <!-- Horns -->
  <path d="M148 158 L135 95 L172 148" fill="#C62828" stroke="#B71C1C" stroke-width="4"/>
  <path d="M252 158 L265 95 L228 148" fill="#C62828" stroke="#B71C1C" stroke-width="4"/>

  <!-- Small arms out (angry pose) -->
  <path d="M75 280 Q50 260 40 240" stroke="#EF5350" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M325 280 Q350 260 360 240" stroke="#EF5350" stroke-width="22" stroke-linecap="round" fill="none"/>
</svg>
