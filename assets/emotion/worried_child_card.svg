<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card frame -->
  <rect x="18" y="26" width="370" height="460" rx="38" fill="#E0E0E0"/>
  <rect x="8" y="8" width="384" height="484" rx="38" fill="white"/>
  <rect x="22" y="22" width="356" height="456" rx="28" fill="#ECEFF1"/>

  <!-- Label bar -->
  <path d="M22 430 H378 V458 Q378 470 366 470 H34 Q22 470 22 458 Z" fill="#90A4AE"/>
  <text x="200" y="456" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="22" font-weight="bold" fill="#37474F" text-anchor="middle">Feeling Worried</text>

  <!-- Illustration: Worried child -->
  <rect x="150" y="320" width="100" height="110" rx="30" fill="#90A4AE"/>
  
  <ellipse cx="200" cy="250" rx="75" ry="85" fill="#FFCC80" stroke="#EF6C00" stroke-width="6"/>
  
  <path d="M130 240 Q130 170 200 160 Q270 170 270 240" fill="#5D4037"/>
  
  <!-- Eyes - wide and uncertain -->
  <ellipse cx="170" cy="240" rx="16" ry="18" fill="white" stroke="#3E2723" stroke-width="3"/>
  <ellipse cx="230" cy="240" rx="16" ry="18" fill="white" stroke="#3E2723" stroke-width="3"/>
  <circle cx="170" cy="243" r="8" fill="#3E2723"/>
  <circle cx="230" cy="243" r="8" fill="#3E2723"/>
  <circle cx="173" cy="240" r="3" fill="white"/>
  <circle cx="233" cy="240" r="3" fill="white"/>
  
  <!-- Worried mouth -->
  <path d="M180 285 L190 280 L200 285 L210 280 L220 285" stroke="#BF360C" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Sweat drop -->
  <path d="M260 200 Q265 185 270 200 Q270 210 260 210 Z" fill="#42A5F5"/>
  
  <!-- Shaky lines showing worry -->
  <path d="M110 220 Q105 210 110 200" stroke="#90A4AE" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M290 220 Q295 210 290 200" stroke="#90A4AE" stroke-width="3" fill="none" opacity="0.6"/>
</svg>
